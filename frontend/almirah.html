    html { scroll-behavior: smooth; }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .animate-pulse-ring::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid #25D366; animation: pulse-ring 2s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
    .fade-up-1 { animation-delay: 0.1s; }
    .fade-up-2 { animation-delay: 0.3s; }

    .feature-card:hover {

      border-color: rgba(180, 83, 9, 0.3);

    }
    .custom-cursor {
      position: fixed; top: 0; left: 0;
      width: 10px; height: 10px;
      background: #b45309; border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
      display: none; opacity: 0;
    }
    @media (pointer: fine) { .custom-cursor { display: block; } .cursor-bound { cursor: none !important; } }
    .custom-cursor.active { opacity: 1; width: 60px; height: 60px; background: rgba(180,83,9,0.15); border: 1px solid rgba(180,83,9,0.6); backdrop-filter: blur(2px); }
  
    /* Language Toggle Fixed Position */

      top: 1rem !important;
      inset-inline-end: 1rem !important;
      direction: ltr !important;
      z-index: 200 !important;
    }
  </style>

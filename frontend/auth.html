<!DOCTYPE html>
<html :lang="lang" :dir="lang === 'ar' ? 'rtl' : 'ltr'" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saeed Furniture | Staff Portal</title>
  <meta name="description" content="Manage your Saeed Furniture orders, tracking, and atelier customizations in KSA.">
  <link rel="stylesheet" href="/dist/output.css">
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/js/auth.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; background-color: #080809; color: white; }
    .gold-text { color: #c9a96e; }
    .gold-bg { background-color: #c9a96e; }
  </style>
</head>
<body class="min-h-screen flex font-sans" x-data="{ lang: 'en', email: '', password: '', error: '' }">
<!-- Restored Transparent Header -->
<header class="absolute top-0 inset-x-0 z-[150] flex justify-between items-center px-6 md:px-10 py-5 text-white pointer-events-none">
  <!-- Left Logo -->
  <a href="/index.html" class="pointer-events-auto flex items-center gap-4 group">
    <img src="https://ik.imagekit.io/de7qvcvqv/images/logo.png?updatedAt=1779608592778" alt="Saeed Furniture" class="h-12 w-auto object-contain drop-shadow-[0_2px_8px_rgba(0,0,0,0.6)] transition-transform duration-500 group-hover:scale-105" style="filter: brightness(0) invert(1);">
    <div class="hidden sm:block">
      <h1 class="text-white font-bold text-lg tracking-[0.2em] uppercase">Saeed Furniture</h1>
      <p class="text-amber-500/80 text-[0.6rem] tracking-[0.3em] uppercase mt-0.5">Bespoke Mastery</p>
    </div>
  </a>

  <!-- Right: Navigation & Lang Toggle -->
  <div class="flex items-center gap-6 md:gap-8 pointer-events-auto">
    <!-- Restored Navigation Routes -->
    <nav class="hidden md:flex items-center gap-6 md:gap-8 text-xs font-semibold tracking-[0.15em] uppercase text-stone-300 drop-shadow-md">
      <a href="/index.html" class="hover:text-amber-400 transition-colors duration-300">Home</a>
      <a href="/about.html" class="hover:text-amber-400 transition-colors duration-300">About</a>
      <a href="/faq.html" class="hover:text-amber-400 transition-colors duration-300">FAQ</a>
      <a href="/contact.html" class="hover:text-amber-400 transition-colors duration-300">Contact</a>
    </nav>
    
    <!-- Divider -->
    <div class="hidden md:block w-px h-6 bg-white/20"></div>

    <!-- Language Toggle -->
    <div class="flex items-center bg-white/10 backdrop-blur-md rounded-full p-1 border border-white/20">
      <button @click="lang = 'en'" :class="lang === 'en' ? 'bg-amber-600 text-white shadow-lg' : 'text-stone-300 hover:text-white'" class="px-3 py-1.5 text-[0.65rem] font-bold tracking-[0.2em] rounded-full transition-all duration-300">EN</button>
      <button @click="lang = 'ar'" :class="lang === 'ar' ? 'bg-amber-600 text-white shadow-lg' : 'text-stone-300 hover:text-white'" class="px-3 py-1.5 text-[0.7rem] font-bold tracking-[0.1em] rounded-full transition-all duration-300" style="font-family: 'Cairo', sans-serif;">عربي</button>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="md:hidden text-white p-2 focus:outline-none" aria-label="Toggle Menu" onclick="document.getElementById('mobile-nav').classList.toggle('hidden')">
      <svg class="w-6 h-6 drop-shadow-md" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
    </button>
  </div>
</header>

<!-- Mobile Nav Dropdown -->
<div id="mobile-nav" class="hidden md:hidden fixed top-24 inset-x-6 z-[140] bg-stone-950/95 backdrop-blur-md border border-white/10 rounded-2xl px-6 py-6 space-y-4 shadow-2xl pointer-events-auto text-center">
  <a href="/index.html" class="block text-white text-sm tracking-widest uppercase hover:text-amber-400">Home</a>
  <a href="/about.html" class="block text-white text-sm tracking-widest uppercase hover:text-amber-400">About</a>
  <a href="/faq.html" class="block text-white text-sm tracking-widest uppercase hover:text-amber-400">FAQ</a>
  <a href="/contact.html" class="block text-white text-sm tracking-widest uppercase hover:text-amber-400">Contact</a>
</div>

  <!-- â”€â”€ Premium Native Page Loader â”€â”€ -->
  <div x-data="{ loaded: document.readyState === 'complete' }" x-init="if (!loaded) window.addEventListener('load', () => loaded = true)" class="fixed inset-0 z-[100] bg-stone-950 flex items-center justify-center transition-opacity duration-1000 ease-in-out" :class="loaded ? 'opacity-0 pointer-events-none' : 'opacity-100'">
    <img src="https://ik.imagekit.io/de7qvcvqv/images/logo.png?updatedAt=1779608592778" alt="Saeed Furniture Loading" class="h-16 w-auto object-contain animate-pulse" style="filter: brightness(0) invert(0.6)">
  </div>
  <!-- ===================== UNIFIED GLOBAL HEADER ===================== -->
  
  <!-- Padding for fixed header -->
  <div class="h-20"></div>

  
  <!-- Left Side: Login Form -->
  <div class="w-full lg:w-1/3 p-12 flex flex-col justify-center relative z-10 bg-[#080809]">
    <div class="mb-12">
      <a href="/" class="text-white/50 hover:text-white transition-colors text-sm">&larr; Back to Main Site</a>
    </div>
    
    <h1 class="text-4xl font-black mb-2 tracking-tight">Staff Portal</h1>
    <p class="text-white/40 mb-12">Secure access for Saeed Furniture personnel.</p>

    <div x-show="error" class="bg-red-500/10 border border-red-500 text-red-500 rounded p-4 mb-6 font-bold" x-text="error"></div>

    <form @submit.prevent="async () => {
      error = '';
      const { data, error: err } = await $store.saeedAuth.signInWithPassword(email, password);
      if (err) {
        error = err.message;
      } else {
        // Route based on role
        const role = data.user.user_metadata?.role || 'client';
        if (role === 'admin') window.location.href = '/dashboard/admin';
        else if (role === 'employee') window.location.href = '/dashboard/production';
        else window.location.href = '/dashboard/client';
      }
    }" class="space-y-6">
      
      <div>
        <label class="block text-xs font-bold text-white/40 mb-2 uppercase tracking-widest">Email Address</label>
        <input type="email" x-model="email" required class="w-full bg-transparent border-b-2 border-white/10 py-3 text-white outline-none transition-colors focus:border-[#c9a96e]">
      </div>
      
      <div>
        <label class="block text-xs font-bold text-white/40 mb-2 uppercase tracking-widest">Password</label>
        <input type="password" x-model="password" required class="w-full bg-transparent border-b-2 border-white/10 py-3 text-white outline-none transition-colors focus:border-[#c9a96e]">
      </div>

      <button type="submit" class="w-full gold-bg text-black font-black py-4 rounded-xl uppercase tracking-widest hover:opacity-90 transition-opacity mt-8">
        Authenticate
      </button>
    </form>
  </div>

  <!-- Right Side: Slow Panning Image -->
  <div class="hidden lg:block lg:w-2/3 relative overflow-hidden">
    <div class="absolute inset-0 bg-[url('/images/catalog/modern_majlis_1.png')] bg-cover bg-center animate-pulse" style="animation: panImage 30s linear infinite alternate;"></div>
    <div class="absolute inset-0 bg-black/40"></div>
  </div>

  <style>
    @keyframes panImage {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(-2%, -2%); }
    }
  </style>
</body>
</html>

  <style>
    /* Carousel snap behavior */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .gold-lines-bg {
      background-image: 
        linear-gradient(45deg, transparent 48%, #c9a96e 49%, #c9a96e 51%, transparent 52%),
        linear-gradient(-45deg, transparent 48%, #c9a96e 49%, #c9a96e 51%, transparent 52%);
      background-size: 200px 200px;
      opacity: 0.05;
    }
    .gold-strip {
      position: absolute;
      background: linear-gradient(to bottom, transparent, #c9a96e, transparent);
      width: 1px;
      height: 100%;
      opacity: 0.1;
      pointer-events: none;
    }

    /* Phase 2 Enhancements */
    @keyframes sweep-shimmer {
      0% { transform: translateX(-100%) skewX(-15deg); opacity: 0; }
      50% { opacity: 0.3; }
      100% { transform: translateX(200%) skewX(-15deg); opacity: 0; }
    }
    .animate-sweep::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
      animation: sweep-shimmer 2s ease-out forwards;
      pointer-events: none;
    }

    @keyframes draw-line {
      from { width: 0; }
      to { width: 100%; }
    }
    .animate-draw-line {
      animation: draw-line 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .arabesque-bg {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path fill="%23c9a96e" d="M50 0C50 25 75 50 100 50C75 50 50 75 50 100C50 75 25 50 0 50C25 50 50 25 50 0Z" opacity="0.03"/></svg>');
      background-size: 100px 100px;
    }

    .rtl-input-line {
      position: relative;
    }
    .rtl-input-line::after {
      content: ''; position: absolute; bottom: 0; right: 0; height: 2px; width: 0;
      background: #c9a96e; transition: width 0.4s ease;
    }
    .rtl-input-line:focus-within::after { width: 100%; }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .animate-pulse-ring::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid #25D366; animation: pulse-ring 2s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes draw-check {
      to { stroke-dashoffset: 0; }
    }
    .animate-draw-check {
      stroke-dasharray: 50; stroke-dashoffset: 50;
      animation: draw-check 1s ease-out forwards;
      animation-delay: 0.3s;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.8s ease-out forwards;
      opacity: 0;
    }
    /* Subtle noise texture overlay */
  </style>

  <style>
    /* Custom Cursor Styles */
    .custom-cursor {
      position: fixed;
      top: 0; left: 0;
      width: 10px; height: 10px;
      background: #c9a96e;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s ease, height 0.3s ease, background 0.3s ease, border-radius 0.3s ease, opacity 0.3s ease;
      display: none;
      opacity: 0;
    }
    @media (pointer: fine) {
      .custom-cursor { display: block; }
      /* Hide default cursor only when hovering bound elements */
      .cursor-bound { cursor: none !important; }
    }
    .custom-cursor.active {
      opacity: 1;
      width: 60px; height: 60px;
      background: rgba(201,169,110, 0.15);
      border: 1px solid rgba(201,169,110, 0.6);
      backdrop-filter: blur(2px);
    }

    :root {

    html { scroll-behavior: smooth; }

    body {

      color: var(--brown);

    /* â”€â”€â”€ Header â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .pf-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245, 237, 224, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(92, 61, 46, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
    }

    .pf-header-logo { height: 36px; width: auto; object-fit: contain; }

    .pf-back {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    .pf-back:hover { color: var(--warm); }
    .pf-back svg { transition: transform 0.3s; }
    .pf-back:hover svg { transform: translateX(-4px); }

    /* â”€â”€â”€ Hero Label â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .pf-hero {
      padding: 64px 32px 40px;
      text-align: center;
    }
    .pf-hero-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--warm);
      margin-bottom: 16px;
    }
    .pf-hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 300;
      color: var(--brown);
      line-height: 1.1;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }
    .pf-hero-subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 400;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.75;
    }
    .pf-divider {
      width: 48px;
      height: 1px;
      background: var(--warm);
      margin: 32px auto 0;
      opacity: 0.5;
    }

    /* â”€â”€â”€ Filter Tabs â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .pf-filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 32px 24px 24px;
      flex-wrap: wrap;
    }
    .pf-filter-btn {
      padding: 8px 22px;
      border-radius: 100px;
      border: 1px solid rgba(92,61,46,0.2);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: all 0.3s;
    }
    .pf-filter-btn:hover,
    .pf-filter-btn.active {
      background: var(--warm);
      border-color: var(--warm);
      color: white;
    }

    /* â”€â”€â”€ Masonry Grid â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .pf-grid {
      padding: 0 24px 80px;
      column-count: 2;
      column-gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 900px) {
      .pf-grid { column-count: 3; column-gap: 20px; padding: 0 40px 100px; }
    }
    @media (max-width: 480px) {
      .pf-grid { column-count: 1; padding: 0 16px 60px; }

    /* â”€â”€â”€ Card â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .pf-card {
      break-inside: avoid;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
      cursor: pointer;
      background: #d4c4b0;
      box-shadow: 0 4px 20px rgba(92,61,46,0.08);
      transition: transform 0.5s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.5s;
    }
    .pf-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 20px 60px rgba(92,61,46,0.18);
    }
    .pf-card img {
      width: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.2,0.8,0.2,1);
    }
    .pf-card:hover img { transform: scale(1.04); }

    /* Card text overlay */
    .pf-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(26,15,10,0.08) 0%, rgba(26,15,10,0.65) 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
      opacity: 1;
      transition: opacity 0.4s;
    }

    /* Card top: logo mark */
    .pf-card-logo {
      width: 36px;
      height: auto;
      opacity: 0.9;
      filter: brightness(0) invert(1);
    }
    .pf-card-logo-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      margin-top: 2px;
    }

    /* Card bottom: text */
    .pf-card-bottom {}
    .pf-card-tag {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 6px;
    }
    .pf-card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 400;
      color: white;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .pf-card-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(201,169,110,0.85);
      border-radius: 100px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: white;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
      backdrop-filter: blur(8px);
    }
    .pf-card-cta:hover { background: rgba(201,169,110,1); }

    /* Featured card (full-width span) */
    .pf-card.featured {
      break-inside: avoid;
    }

    /* â”€â”€â”€ Lightbox â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .pf-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(26,15,10,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .pf-lightbox-inner {
      position: relative;
      max-width: 900px;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      background: var(--sand-2);
    }
    .pf-lightbox-img {
      width: 100%;
      max-height: 75vh;
      object-fit: cover;
      display: block;
    }
    .pf-lightbox-info {
      padding: 24px 32px 28px;
    }
    .pf-lightbox-tag {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--warm);
      margin-bottom: 8px;
    }
    .pf-lightbox-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--brown);
      margin-bottom: 8px;
    }
    .pf-lightbox-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .pf-lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(26,15,10,0.5);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      transition: background 0.3s;
    }
    .pf-lightbox-close:hover { background: var(--warm); }

    .pf-lightbox-wa {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #25d366;
      border-radius: 100px;
      color: white;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .pf-lightbox-wa:hover { opacity: 0.85; }

    /* â”€â”€â”€ CTA Footer â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */

    .pf-cta-footer-eyebrow {

      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--warm);
      margin-bottom: 20px;

    .pf-cta-footer-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      color: rgba(245,237,224,0.95);
      margin-bottom: 12px;
    }
    .pf-cta-footer-sub {
      font-size: 0.9rem;
      color: rgba(245,237,224,0.5);
      margin-bottom: 40px;
    }
    .pf-cta-footer-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: var(--warm);
      color: white;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .pf-cta-footer-btn:hover {
      background: #d4b87a;
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(201,169,110,0.4);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.7s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.35s; }

    [x-cloak] { display: none !important; }
  </style>
</head>

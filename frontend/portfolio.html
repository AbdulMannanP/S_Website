<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Saeed Furniture | سعيد للأثاث</title>
  <meta name="description" content="Browse our past portfolio of bespoke majlis sets and luxury sofas crafted in Saudi Arabia. Saeed Furniture — made to order furniture KSA." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cairo:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand:    #f5ede0;
      --sand-2:  #eddcca;
      --warm:    #c9a96e;
      --brown:   #5c3d2e;
      --muted:   #9e8874;
      --dark:    #1a0f0a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', 'Cairo', sans-serif;
      background-color: var(--sand);
      color: var(--brown);
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    .pf-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245, 237, 224, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(92, 61, 46, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
    }

    .pf-header-logo { height: 36px; width: auto; object-fit: contain; }

    .pf-back {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    .pf-back:hover { color: var(--warm); }
    .pf-back svg { transition: transform 0.3s; }
    .pf-back:hover svg { transform: translateX(-4px); }

    /* ─── Hero Label ─────────────────────────────────────────── */
    .pf-hero {
      padding: 64px 32px 40px;
      text-align: center;
    }
    .pf-hero-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--warm);
      margin-bottom: 16px;
    }
    .pf-hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 300;
      color: var(--brown);
      line-height: 1.1;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }
    .pf-hero-subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 400;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.75;
    }
    .pf-divider {
      width: 48px;
      height: 1px;
      background: var(--warm);
      margin: 32px auto 0;
      opacity: 0.5;
    }

    /* ─── Filter Tabs ────────────────────────────────────────── */
    .pf-filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 32px 24px 24px;
      flex-wrap: wrap;
    }
    .pf-filter-btn {
      padding: 8px 22px;
      border-radius: 100px;
      border: 1px solid rgba(92,61,46,0.2);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: all 0.3s;
    }
    .pf-filter-btn:hover,
    .pf-filter-btn.active {
      background: var(--warm);
      border-color: var(--warm);
      color: white;
    }

    /* ─── Masonry Grid ───────────────────────────────────────── */
    .pf-grid {
      padding: 0 24px 80px;
      column-count: 2;
      column-gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 900px) {
      .pf-grid { column-count: 3; column-gap: 20px; padding: 0 40px 100px; }
    }
    @media (max-width: 480px) {
      .pf-grid { column-count: 1; padding: 0 16px 60px; }
    }

    /* ─── Card ───────────────────────────────────────────────── */
    .pf-card {
      break-inside: avoid;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
      cursor: pointer;
      background: #d4c4b0;
      box-shadow: 0 4px 20px rgba(92,61,46,0.08);
      transition: transform 0.5s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.5s;
    }
    .pf-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 20px 60px rgba(92,61,46,0.18);
    }
    .pf-card img {
      width: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.2,0.8,0.2,1);
    }
    .pf-card:hover img { transform: scale(1.04); }

    /* Card text overlay */
    .pf-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(26,15,10,0.08) 0%, rgba(26,15,10,0.65) 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
      opacity: 1;
      transition: opacity 0.4s;
    }

    /* Card top: logo mark */
    .pf-card-logo {
      width: 36px;
      height: auto;
      opacity: 0.9;
      filter: brightness(0) invert(1);
    }
    .pf-card-logo-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      margin-top: 2px;
    }

    /* Card bottom: text */
    .pf-card-bottom {}
    .pf-card-tag {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 6px;
    }
    .pf-card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 400;
      color: white;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .pf-card-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(201,169,110,0.85);
      border-radius: 100px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: white;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
      backdrop-filter: blur(8px);
    }
    .pf-card-cta:hover { background: rgba(201,169,110,1); }

    /* Featured card (full-width span) */
    .pf-card.featured {
      break-inside: avoid;
    }

    /* ─── Lightbox ───────────────────────────────────────────── */
    .pf-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(26,15,10,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .pf-lightbox-inner {
      position: relative;
      max-width: 900px;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      background: var(--sand-2);
    }
    .pf-lightbox-img {
      width: 100%;
      max-height: 75vh;
      object-fit: cover;
      display: block;
    }
    .pf-lightbox-info {
      padding: 24px 32px 28px;
    }
    .pf-lightbox-tag {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--warm);
      margin-bottom: 8px;
    }
    .pf-lightbox-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--brown);
      margin-bottom: 8px;
    }
    .pf-lightbox-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .pf-lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(26,15,10,0.5);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      transition: background 0.3s;
    }
    .pf-lightbox-close:hover { background: var(--warm); }

    .pf-lightbox-wa {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #25d366;
      border-radius: 100px;
      color: white;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .pf-lightbox-wa:hover { opacity: 0.85; }

    /* ─── CTA Footer ─────────────────────────────────────────── */
    .pf-cta-footer {
      background: var(--brown);
      padding: 80px 32px;
      text-align: center;
    }
    .pf-cta-footer-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--warm);
      margin-bottom: 20px;
    }
    .pf-cta-footer-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      color: rgba(245,237,224,0.95);
      margin-bottom: 12px;
    }
    .pf-cta-footer-sub {
      font-size: 0.9rem;
      color: rgba(245,237,224,0.5);
      margin-bottom: 40px;
    }
    .pf-cta-footer-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: var(--warm);
      color: white;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .pf-cta-footer-btn:hover {
      background: #d4b87a;
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(201,169,110,0.4);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.7s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.35s; }

    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="portfolioApp()" x-init="init()">

  <!-- ═══ HEADER ═══════════════════════════════════════════════ -->
  <header class="pf-header">
    <a href="/">
      <img src="https://ik.imagekit.io/de7qvcvqv/images/logo.png" class="pf-header-logo" alt="Saeed Furniture" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
      <span style="display:none; font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:600; color:var(--brown); letter-spacing:0.1em;">Saeed Furniture</span>
    </a>
    <a href="/" class="pf-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span x-text="lang === 'ar' ? 'العودة' : 'Back to Home'"></span>
    </a>
  </header>

  <!-- ═══ HERO ══════════════════════════════════════════════════ -->
  <div class="pf-hero">
    <div class="pf-hero-eyebrow fade-up" x-text="lang === 'ar' ? 'أعمالنا المنجزة' : 'Our Completed Works'"></div>
    <h1 class="pf-hero-title fade-up delay-1">
      <span x-show="lang !== 'ar'">The Portfolio</span>
      <span x-show="lang === 'ar'" style="font-family:'Cairo',sans-serif; font-weight:300;">سابقة أعمالنا</span>
    </h1>
    <p class="pf-hero-subtitle fade-up delay-2"
       x-text="lang === 'ar' ? 'كل قطعة قصة. كل مجلس تعبير عن هوية. تصفح مجموعة مختارة من أعمالنا المنجزة في السعودية.' : 'Every piece is a story. Every majlis an expression of identity. Browse a curated selection of our completed works across Saudi Arabia.'">
    </p>
    <div class="pf-divider fade-up delay-3"></div>
  </div>

  <!-- ═══ FILTER TABS ══════════════════════════════════════════ -->
  <div class="pf-filters">
    <template x-for="f in filters" :key="f.id">
      <button class="pf-filter-btn"
              :class="activeFilter === f.id ? 'active' : ''"
              @click="activeFilter = f.id"
              x-text="lang === 'ar' ? f.labelAr : f.label">
      </button>
    </template>
  </div>

  <!-- ═══ MASONRY GRID ═════════════════════════════════════════ -->
  <div class="pf-grid">
    <template x-for="(item, i) in filteredItems" :key="item.id">
      <div class="pf-card" :class="item.featured ? 'featured' : ''"
           @click="openLightbox(item)"
           x-intersect.once="$el.style.animation = `fadeUp 0.6s ease ${i * 0.07}s both`">
        <img :src="item.image"
             :alt="item.title"
             :style="item.tall ? 'aspect-ratio: 3/4;' : (item.wide ? 'aspect-ratio: 4/3;' : 'aspect-ratio: 1/1;')"
             loading="lazy"
             onerror="this.src='https://ik.imagekit.io/de7qvcvqv/images/hero.png'">

        <div class="pf-card-overlay">
          <!-- Top: Brand mark -->
          <div>
            <img src="https://ik.imagekit.io/de7qvcvqv/images/logo.png" class="pf-card-logo" alt="Saeed" onerror="this.style.display='none'">
            <div class="pf-card-logo-wordmark" x-text="lang === 'ar' ? 'سعيد للأثاث' : 'Saeed Furniture'"></div>
          </div>
          <!-- Bottom: Info -->
          <div class="pf-card-bottom">
            <div class="pf-card-tag" x-text="lang === 'ar' ? item.tagAr : item.tag"></div>
            <div class="pf-card-title" x-text="lang === 'ar' ? item.titleAr : item.title"></div>
            <button class="pf-card-cta">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              <span x-text="lang === 'ar' ? 'طلب مماثل' : 'Order Similar'"></span>
            </button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- ═══ LIGHTBOX ═════════════════════════════════════════════ -->
  <div class="pf-lightbox" x-show="lightboxItem" x-cloak
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       @click.self="lightboxItem = null"
       @keydown.escape.window="lightboxItem = null">
    <div class="pf-lightbox-inner"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100">
      <template x-if="lightboxItem">
        <div>
          <img :src="lightboxItem.image" :alt="lightboxItem.title" class="pf-lightbox-img">
          <button class="pf-lightbox-close" @click="lightboxItem = null" aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
          <div class="pf-lightbox-info">
            <div class="pf-lightbox-tag" x-text="lang === 'ar' ? lightboxItem.tagAr : lightboxItem.tag"></div>
            <div class="pf-lightbox-title" x-text="lang === 'ar' ? lightboxItem.titleAr : lightboxItem.title"></div>
            <p class="pf-lightbox-desc" x-text="lang === 'ar' ? lightboxItem.descAr : lightboxItem.desc"></p>
            <a :href="waLink(lightboxItem)" target="_blank" class="pf-lightbox-wa">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              <span x-text="lang === 'ar' ? 'أطلب تصميماً مماثلاً' : 'Order a similar design'"></span>
            </a>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- ═══ CTA FOOTER ═══════════════════════════════════════════ -->
  <div class="pf-cta-footer">
    <div class="pf-cta-footer-eyebrow" x-text="lang === 'ar' ? 'تواصل معنا' : 'Get Started'"></div>
    <h2 class="pf-cta-footer-title">
      <span x-show="lang !== 'ar'" style="font-family:'Cormorant Garamond',serif;">Your Vision, Crafted.</span>
      <span x-show="lang === 'ar'" style="font-family:'Cairo',sans-serif; font-weight:300;">تصميمك، بأيدٍ ماهرة.</span>
    </h2>
    <p class="pf-cta-footer-sub" x-text="lang === 'ar' ? 'كل طقم يُصنع خصيصاً لك — شاهد كيف نحوّل ذوقك إلى أثاث يدوم.' : 'Every set is made-to-order, just for you — see how we turn your taste into lasting craftsmanship.'"></p>
    <a href="/" class="pf-cta-footer-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      <span x-text="lang === 'ar' ? 'اختر موديلك الآن' : 'Select Your Model'"></span>
    </a>
  </div>

  <script>
    const IMAGE_BASE = 'https://ik.imagekit.io/de7qvcvqv/';

    function portfolioApp() {
      return {
        lang: 'ar',
        activeFilter: 'all',
        lightboxItem: null,

        filters: [
          { id: 'all',          label: 'All Works',           labelAr: 'جميع الأعمال' },
          { id: 'floor',        label: 'Floor Majlis',        labelAr: 'مجلس أرضي' },
          { id: 'elevated',     label: 'Elevated Majlis',     labelAr: 'مجلس مرتفع' },
          { id: 'contemporary', label: 'Contemporary',        labelAr: 'معاصر' },
          { id: 'tub',          label: 'Tub-Style',           labelAr: 'تب ستايل' },
        ],

        portfolio: [
          {
            id: 1, category: 'elevated', featured: false, tall: true,
            image: IMAGE_BASE + 'images/catalog/subtype_elevated_peg_base_gallery_1.png',
            tag: 'Elevated Majlis',     tagAr: 'مجلس مرتفع',
            title: 'Peg-Base Serenity', titleAr: 'هدوء القاعدة الوتدية',
            desc: 'A bespoke elevated majlis set with hand-finished peg-base legs and deep-cushioned wraparound seating. Delivered in Riyadh.',
            descAr: 'طقم مجلس مرتفع مخصص بأرجل وتدية مشطوبة يدوياً ومقاعد ذات وسائد عميقة. تم التسليم في الرياض.',
          },
          {
            id: 2, category: 'floor', featured: false, tall: false,
            image: IMAGE_BASE + 'images/catalog/type_modern_floor_majlis_gallery_1.png',
            tag: 'Floor Majlis',        tagAr: 'مجلس أرضي',
            title: 'Cloud-Base Flow',   titleAr: 'انسياب القاعدة السحابية',
            desc: 'A sweeping floor majlis in ivory bouclé, with cloud-soft base sections sized to a 7×5m reception room.',
            descAr: 'مجلس أرضي فسيح بقماش بوكليه عاجي، بأقسام قاعدة ناعمة كالسحاب مقاسة لغرفة استقبال 7×5م.',
          },
          {
            id: 3, category: 'contemporary', featured: false, tall: false,
            image: IMAGE_BASE + 'images/catalog/type_elevated_contemporary_gallery_1.png',
            tag: 'Contemporary',        tagAr: 'معاصر',
            title: 'Flush-Base Precision', titleAr: 'دقة القاعدة المستوية',
            desc: 'Clean-line contemporary seating with a flush timber base and tone-on-tone upholstery. Jeddah commission.',
            descAr: 'مقاعد معاصرة بخطوط نظيفة مع قاعدة خشبية مستوية ونسيج متناسق. طلب من جدة.',

        get filteredItems() {
          if (this.activeFilter === 'all') return this.portfolio;
          return this.portfolio.filter(i => i.category === this.activeFilter);
        },

        openLightbox(item) {
          this.lightboxItem = item;
          document.body.style.overflow = 'hidden';
        },

        waLink(item) {
          const msg = this.lang === 'ar'
            ? `مرحباً، أعجبني تصميم "${item.titleAr}" في معرض أعمالكم. هل بالإمكان الاستفسار عن تصميم مماثل؟`
            : `Hello, I loved the "${item.title}" from your portfolio. Can I inquire about a similar design?`;
          return `https://wa.me/9660536768019?text=${encodeURIComponent(msg)}`;
        },

        init() {
          // Language from localStorage or default ar
          const saved = localStorage.getItem('saeed_lang');
          if (saved === 'en') { this.lang = 'en'; document.documentElement.lang = 'en'; document.documentElement.dir = 'ltr'; }

          // Close lightbox on Escape
          this.$watch('lightboxItem', val => {
            document.body.style.overflow = val ? 'hidden' : '';
          });
        },
      };

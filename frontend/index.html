<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سعيد للأثاث | Saeed Furniture — مجالس فاخرة</title>
  <meta name="description" content="مجالس فاخرة مصنوعة في المملكة العربية السعودية. تصاميم عصرية وتراثية. زيارة منزلية مجانية.">
  <meta property="og:title"       content="سعيد للأثاث | Luxury Majlis KSA">
  <meta property="og:description" content="أثاث مخصص بتصاميم تناسب قلب منزلك.">
  <meta property="og:type"        content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: {
              DEFAULT: '#c9a96e', // Royal Gold
              light: '#dcc69a',
              dim: 'rgba(201, 169, 110, 0.1)'
            },
            bronze: {
              DEFAULT: '#080809', // Deep Charcoal
              dark: '#000000'
            },
            ivory: {
              DEFAULT: '#FCFBF8', // Elegant Light Background
              darker: '#F5F2EA'
            }
          },
          fontFamily: {
            cairo: ['Cairo', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Carousel snap behavior */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
  <script defer src="https://unpkg.com/@alpinejs/intersect@3.14.1/dist/cdn.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body class="bg-ivory text-bronze font-cairo antialiased min-h-screen overflow-x-hidden selection:bg-gold/30 selection:text-bronze" x-data="saeedApp()" x-init="init()">

  <!-- ── Progress Indicator ──────────────────────────────── -->
  <div class="fixed top-0 inset-x-0 h-[3px] bg-ivory-darker z-[2000]" x-show="step !== 'success' && step !== 'hero'">
    <div class="h-full bg-gold transition-all duration-700 ease-out shadow-[0_0_10px_rgba(201,169,110,0.5)]" :style="'width:' + progress + '%'"></div>
  </div>

  <!-- ── Loading Screen ──────────────────────────────────── -->
  <div class="fixed inset-0 bg-ivory flex flex-col items-center justify-center gap-4 z-[9999] transition-opacity duration-500" x-show="loading" x-cloak x-transition.opacity>
    <div class="text-3xl font-extrabold text-gold tracking-widest">SF</div>
    <div class="flex gap-2">
      <span class="w-2 h-2 bg-bronze rounded-full animate-bounce"></span>
      <span class="w-2 h-2 bg-bronze rounded-full animate-bounce" style="animation-delay: 200ms"></span>
      <span class="w-2 h-2 bg-bronze rounded-full animate-bounce" style="animation-delay: 400ms"></span>
    </div>
  </div>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="fixed top-0 inset-x-0 z-[1000] h-16 flex items-center justify-between px-5 sm:px-10 bg-ivory/80 backdrop-blur-md border-b border-ivory-darker transition-all duration-300">
    <div class="text-xl font-extrabold text-bronze tracking-widest" x-text="content.brand?.logo || 'SF'"></div>
    
    <nav class="hidden md:flex gap-8 text-[0.85rem] font-bold text-bronze/80 uppercase tracking-widest">
      <a href="#about" class="hover:text-gold transition-colors" x-text="lang === 'ar' ? 'من نحن' : 'About'"></a>
      <a href="#faq" class="hover:text-gold transition-colors" x-text="lang === 'ar' ? 'الأسئلة الشائعة' : 'FAQ'"></a>
      <a href="#contact" class="hover:text-gold transition-colors" x-text="lang === 'ar' ? 'تواصل معنا' : 'Contact'"></a>
      <a href="#order" class="hover:text-gold transition-colors" x-text="lang === 'ar' ? 'اطلب الآن' : 'Order'"></a>
    </nav>
    
    <div class="flex items-center gap-4">
      <button @click="toggleLang()" class="text-[0.75rem] font-extrabold text-bronze hover:text-gold transition-colors uppercase tracking-widest px-2 py-1 border border-bronze/10 rounded">
        <span x-text="lang === 'ar' ? 'EN' : 'AR'"></span>
      </button>
      <a href="#order" class="md:hidden text-[0.75rem] font-bold text-gold uppercase tracking-widest border border-gold/30 px-3 py-1.5 rounded-full" x-text="lang === 'ar' ? 'اطلب' : 'Order'"></a>
    </div>
  </header>

  <!-- ── Main Journey ────────────────────────────────────── -->
  <main class="transition-all duration-500 pt-16" x-show="!loading" x-cloak>

    <!-- ══ HERO SECTION ════════════════════════════════════ -->
    <section id="hero" class="relative min-h-[90vh] flex flex-col items-center justify-center text-center px-5">
      <!-- High-res Background Image with Overlay -->
      <div class="absolute inset-0 z-[-1] overflow-hidden bg-[#080809]">
        <img src="images/hero.png" class="w-full h-full object-cover brightness-[0.6] scale-105" alt="Luxury Majlis">
        <div class="absolute inset-0 bg-gradient-to-t from-[#080809] to-transparent"></div>
      </div>

      <!-- Hero Content -->
      <div class="max-w-[700px] mb-8 mt-16">
        <h1 class="text-5xl md:text-7xl font-extrabold leading-[1.1] text-white mb-6 drop-shadow-2xl" x-text="lang === 'ar' ? content.hero?.titleArabic : 'Luxury Majlis with Authentic Saudi Touch'"></h1>
        <p class="text-xl md:text-2xl text-white/80 leading-relaxed mb-12 max-w-[500px] mx-auto font-medium" x-text="lang === 'ar' ? content.hero?.subtitleArabic : 'Custom furniture built specifically for your home. We serve clients across the Kingdom.'"></p>

        
      </div>
    </section>

    <!-- ══ USP GRID SECTION ════════════════════════════════ -->
    <section id="usp" class="py-20 px-5 bg-white border-b border-ivory-darker">
      <div class="max-w-[1000px] mx-auto grid grid-cols-2 md:grid-cols-4 gap-8 opacity-0 translate-y-8 transition-all duration-1000 ease-out" x-intersect="$el.classList.remove('opacity-0', 'translate-y-8')">
        
        <div class="flex flex-col items-center text-center gap-4">
          <div class="w-16 h-16 rounded-full bg-ivory flex items-center justify-center text-gold border border-gold/20 shadow-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          </div>
          <h3 class="text-[0.9rem] font-extrabold text-bronze uppercase tracking-widest" x-text="lang === 'ar' ? 'صنع في السعودية' : 'Made in KSA'"></h3>
        </div>

        <div class="flex flex-col items-center text-center gap-4">
          <div class="w-16 h-16 rounded-full bg-ivory flex items-center justify-center text-gold border border-gold/20 shadow-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          </div>
          <h3 class="text-[0.9rem] font-extrabold text-bronze uppercase tracking-widest" x-text="lang === 'ar' ? 'زيارة منزلية مجانية' : 'Free Home Visit'"></h3>
        </div>

        <div class="flex flex-col items-center text-center gap-4">
          <div class="w-16 h-16 rounded-full bg-ivory flex items-center justify-center text-gold border border-gold/20 shadow-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>
          </div>
          <h3 class="text-[0.9rem] font-extrabold text-bronze uppercase tracking-widest" x-text="lang === 'ar' ? 'ألوان وخامات متعددة' : 'Material & Color Selection'"></h3>
        </div>

        <div class="flex flex-col items-center text-center gap-4">
          <div class="w-16 h-16 rounded-full bg-ivory flex items-center justify-center text-gold border border-gold/20 shadow-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
          </div>
          <h3 class="text-[0.9rem] font-extrabold text-bronze uppercase tracking-widest" x-text="lang === 'ar' ? 'توصيل مجاني' : 'Free Home Delivery'"></h3>
        </div>

      </div>
    </section>

    <!-- ══ ABOUT SECTION ═══════════════════════════════════ -->
    <section id="about" class="py-24 px-5 bg-ivory-darker border-b border-ivory">
      <div class="max-w-[1000px] mx-auto grid md:grid-cols-2 gap-12 items-center opacity-0 translate-y-8 transition-all duration-1000 ease-out" x-intersect="$el.classList.remove('opacity-0', 'translate-y-8')">
        
        <div class="order-2 md:order-1">
          <div class="text-[0.7rem] font-bold text-gold tracking-[0.2em] uppercase mb-4" x-text="lang === 'ar' ? 'اكتشف خياراتنا' : 'Explore Our Options'"></div>
          <h2 class="text-3xl md:text-5xl font-extrabold text-bronze leading-tight mb-6" x-text="lang === 'ar' ? 'عملية مبسطة لاختيار أثاثك' : 'A Simplified Process for Your Furniture'"></h2>
          <p class="text-lg text-bronze/70 leading-relaxed mb-6 font-medium" x-text="lang === 'ar' ? 'استكشف خياراتنا المتعددة. اختر الألوان والخامات التي تناسب مساحتك. نحن نقوم بالتصنيع والتوصيل إلى منزلك بدون أي تكلفة إضافية.' : 'Explore our options. Choose your colors and materials. We build it and deliver it to your residence at no cost.'"></p>
          <p class="text-[0.8rem] text-bronze/40 font-bold uppercase tracking-widest" x-text="lang === 'ar' ? '* تطبق الشروط والأحكام' : '* Terms & Conditions apply'"></p>
        </div>

        <div class="order-1 md:order-2 w-full overflow-hidden rounded-2xl shadow-xl bg-[#080809] border border-ivory shadow-gold/5 relative group" x-data="{ timer: null, next() { this.$refs.carousel.scrollBy({ left: this.$refs.carousel.clientWidth, behavior: 'smooth' }); if(this.$refs.carousel.scrollLeft >= this.$refs.carousel.scrollWidth - this.$refs.carousel.clientWidth - 10) { this.$refs.carousel.scrollTo({ left: 0, behavior: 'smooth' }); } } }" x-init="timer = setInterval(() => next(), 4000)">
          <div x-ref="carousel" class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar">
            <div class="relative w-full h-[400px] snap-center flex-none" x-data="{ loaded: false }">
              <img src="images/modern.png" loading="lazy" @load="loaded = true" class="absolute inset-0 w-full h-full object-cover transition-all duration-700" :class="loaded ? 'blur-0' : 'blur-md'" alt="Modern">
            </div>
            <div class="relative w-full h-[400px] snap-center flex-none" x-data="{ loaded: false }">
              <img src="images/authentic.png" loading="lazy" @load="loaded = true" class="absolute inset-0 w-full h-full object-cover transition-all duration-700" :class="loaded ? 'blur-0' : 'blur-md'" alt="Authentic">
            </div>
            <div class="relative w-full h-[400px] snap-center flex-none" x-data="{ loaded: false }">
              <img src="images/heritage.png" loading="lazy" @load="loaded = true" class="absolute inset-0 w-full h-full object-cover transition-all duration-700" :class="loaded ? 'blur-0' : 'blur-md'" alt="Heritage">
            </div>
          </div>
          
        </div>

      </div>
    </section>

    <!-- ══ FAQ SECTION ═════════════════════════════════════ -->
    <section id="faq" class="py-24 px-5 bg-white border-b border-ivory-darker">
      <div class="max-w-[700px] mx-auto opacity-0 translate-y-8 transition-all duration-1000 ease-out" x-intersect="$el.classList.remove('opacity-0', 'translate-y-8')">
        <div class="text-[0.7rem] font-bold text-gold tracking-[0.2em] uppercase mb-4 text-center" x-text="lang === 'ar' ? 'الأسئلة الشائعة' : 'FAQ'"></div>
        <h2 class="text-3xl md:text-5xl font-extrabold text-bronze leading-tight mb-12 text-center" x-text="lang === 'ar' ? 'كيف نعمل؟' : 'How it works'"></h2>
        
        <div class="space-y-4" x-data="{ active: null }">
          
          <div class="border border-ivory-darker rounded-2xl bg-ivory overflow-hidden transition-all duration-300">
            <button class="w-full px-6 py-5 text-start flex justify-between items-center focus:outline-none" @click="active = active === 1 ? null : 1">
              <span class="font-bold text-bronze text-lg" x-text="lang === 'ar' ? 'متى يمكنني اختيار الألوان؟' : 'When do I get to choose the colours?'"></span>
              <span class="text-gold transform transition-transform duration-300" :class="{'rotate-180': active === 1}">▼</span>
            </button>
            <div class="px-6 overflow-hidden transition-all duration-500 max-h-0" :style="active === 1 ? 'max-height: 200px' : ''">
              <p class="pb-5 text-bronze/70 leading-relaxed" x-text="lang === 'ar' ? 'لديك تحكم كامل في المواد والألوان. يمكنك تحديد اختياراتك إما أثناء زيارة منزلية مجانية مجدولة من قبل فريقنا، أو عن طريق زيارة أقرب معرض لنا.' : 'You have complete control over materials and colors. You can make your selections either during a scheduled free home visit by our team, or by visiting our nearest shop.'"></p>
            </div>
          </div>

          <div class="border border-ivory-darker rounded-2xl bg-ivory overflow-hidden transition-all duration-300">
            <button class="w-full px-6 py-5 text-start flex justify-between items-center focus:outline-none" @click="active = active === 2 ? null : 2">
              <span class="font-bold text-bronze text-lg" x-text="lang === 'ar' ? 'ما هي الخامات المتوفرة؟' : 'What are the materials available?'"></span>
              <span class="text-gold transform transition-transform duration-300" :class="{'rotate-180': active === 2}">▼</span>
            </button>
            <div class="px-6 overflow-hidden transition-all duration-500 max-h-0" :style="active === 2 ? 'max-height: 200px' : ''">
              <p class="pb-5 text-bronze/70 leading-relaxed" x-text="lang === 'ar' ? 'لديك تحكم كامل في المواد والألوان. يمكنك تحديد اختياراتك إما أثناء زيارة منزلية مجانية مجدولة من قبل فريقنا، أو عن طريق زيارة أقرب معرض لنا.' : 'You have complete control over materials and colors. You can make your selections either during a scheduled free home visit by our team, or by visiting our nearest shop.'"></p>
            </div>
          </div>

        </div>
      </div>
    </section>
    </div> <!-- End Landing Page Wrapper -->

    <!-- ══ ISOLATED SELECTION VIEW (Pinterest Style) ════════ -->
    <section id="order" class="min-h-screen py-16 px-5 bg-[#080809] text-white" x-show="isSelectionMode" x-transition:enter="transition ease-out duration-700" x-transition:enter-start="opacity-0 translate-y-8" x-transition:enter-end="opacity-100 translate-y-0" x-cloak>
      <div class="max-w-[1200px] mx-auto">
        
        <!-- Minimal Header & Close Button -->
        <div class="flex justify-between items-center mb-10">
          <div class="text-xl font-extrabold text-white tracking-widest uppercase" x-text="lang === 'ar' ? (content.brand?.nameArabic || 'سعيد للأثاث') : (content.brand?.name || 'Saeed Furniture')"></div>
          <button class="text-white/50 hover:text-white transition-colors flex items-center gap-2 bg-white/5 px-4 py-2 rounded-full border border-white/10" @click="isSelectionMode = false; window.scrollTo({top: 0, behavior: 'smooth'})">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" :class="lang === 'ar' ? 'rotate-180' : ''"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            <span class="text-sm font-bold" x-text="lang === 'ar' ? 'العودة' : 'Back'"></span>
          </button>
        </div>

        <div class="grid md:grid-cols-[1fr_1.5fr] gap-8">
        
        <!-- Contact Details -->
        <div id="contact" class="flex flex-col gap-6 bg-white/5 backdrop-blur-2xl border border-white/10 p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden h-fit">
          <div class="absolute inset-0 bg-gradient-to-br from-gold/10 to-transparent opacity-30 pointer-events-none"></div>
          <div class="text-[0.7rem] font-bold text-gold tracking-[0.2em] uppercase mb-2" x-text="lang === 'ar' ? 'تواصل معنا' : 'Get In Touch'"></div>
          <h2 class="text-3xl font-extrabold text-white leading-tight mb-4 relative z-10" x-text="lang === 'ar' ? 'نحن هنا لمساعدتك' : 'We are here to help'"></h2>
          <p class="text-white/70 mb-8 font-medium relative z-10" x-text="lang === 'ar' ? 'فريقنا متاح للإجابة على جميع استفساراتك وتحديد موعد لزيارتك المنزلية المجانية.' : 'Our team is available to answer all your questions and schedule your free home visit.'"></p>
          
          <a :href="'https://wa.me/' + (content.brand?.whatsappNumber || '9288004450')" class="flex items-center gap-4 bg-[#080809]/50 border border-white/10 p-5 rounded-2xl shadow-sm hover:bg-[#080809] transition-colors relative z-10">
            <div class="w-12 h-12 bg-[#25d366]/10 text-[#25d366] rounded-full flex items-center justify-center shrink-0">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            </div>
            <div>
              <div class="text-[0.75rem] font-bold text-white/50 uppercase tracking-widest">WhatsApp</div>
              <div class="text-lg font-extrabold text-white" x-text="content.brand?.whatsappNumber || '9288004450'" dir="ltr"></div>
            </div>
          </a>

          <div class="flex items-center gap-4 bg-[#080809]/50 border border-white/10 p-5 rounded-2xl shadow-sm mt-2 relative z-10">
            <div class="w-12 h-12 bg-white/5 text-white rounded-full flex items-center justify-center shrink-0">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </div>
            <div>
              <div class="text-[0.75rem] font-bold text-bronze/50 uppercase tracking-widest" x-text="lang === 'ar' ? 'الموقع' : 'Location'"></div>
              <div class="text-base font-extrabold text-white" x-text="lang === 'ar' ? 'المملكة العربية السعودية' : 'Kingdom of Saudi Arabia'"></div>
            </div>
          </div>
        </div>

        <!-- Order Form Steps -->
        <div id="order-form-container" class="bg-white/5 backdrop-blur-3xl rounded-[2.5rem] shadow-2xl border border-white/10 p-8 md:p-12 relative overflow-hidden min-h-[500px]">
          
          <!-- ══ STEP 2: Style Selector ════════════════════════ -->
          <div x-show="step === 'hero' || step === 'style'" x-transition:enter="transition ease-out duration-500 delay-100" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0">
            <div class="text-[0.7rem] font-bold text-gold tracking-[0.2em] uppercase mb-4 text-center" x-text="lang === 'ar' ? 'الخطوة 1 من 4' : 'Step 1 of 4'"></div>
            <h2 class="text-3xl font-extrabold text-white leading-tight mb-2 text-center" x-text="lang === 'ar' ? (content.styles?.titleArabic || 'اختر طرازك') : 'Choose your style'"></h2>
            <p class="text-[0.9rem] text-white/50 mb-8 text-center font-medium" x-text="lang === 'ar' ? 'اختيارك يحدد هويّة مجلسك' : 'Your choice defines your space'"></p>

            <div class="grid gap-4">
              <template x-for="style in (content.styles?.options || [])" :key="style.id">

     @click="onWhatsAppClick()"
     :title="lang === 'ar' ? 'تحدث معنا على واتساب' : 'Chat with us on WhatsApp'">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>

  <!-- ── App Logic ─────────────────────────────────────────── -->
  <script>
  // Relative URL
  const API = window.location.origin;
  let autoSaveController = null;

  function saeedApp() {
    return {
      /* ── UI State ─────────────────────────────────────── */
      lang:              'ar',
      isSelectionMode:   false,
      step:              'hero', // We keep step='hero' to prevent immediate autosave firing, UI maps 'hero' and 'style' to the first wizard step.
      progress:          5,
      loading:           true,
      submitting:        false,
      submitError:       '',
      accessoriesClicked: false,

      /* ── Content CMS ──────────────────────────────────── */
      content: { brand:{}, hero:{}, usps:[], styles:{options:[]}, capacity:{options:[]}, contact:{}, success:{} },

      /* ── Debounce Timers ──────────────────────────────── */
      _phoneTimer: null,
      _nameTimer:  null,
      _cityTimer:  null,
      _visionTimer: null,

      /* ── Session State Model ──────────────────────────── */
      form: {
        order_id:          null,
        session_id:        null,
        name:              '',
        phone:             '',
        district_city:     '',
        style_selected:    '',
        capacity_selected: '',
        visit_type:        'Home Visit',
        vision_notes:      '',
        last_step:         'hero',
        status:            'draft',
        score:             0,
        time_spent:        0,
        source:            'website',
        user_agent:        '',
        referrer:          '',
        company_name:      ''
      },

      /* ── init ─────────────────────────────────────────── */
      async init() {
        this.form.user_agent = navigator.userAgent;
        this.form.referrer   = document.referrer;
        
        // Load language preference from local storage if exists
        const savedLang = localStorage.getItem('saeed_lang');
        if (savedLang === 'en') {
          this.toggleLang(false);
        }

        try {
          const r = await fetch('./content.json');
          this.content = await r.json();
        } catch (e) { console.error('[CMS]', e); }

        try {
          const r = await fetch(`${API}/api/session`);
          const d = await r.json();
          if (d.success) {
            this.form.order_id   = d.order_id;
            this.form.session_id = d.session_id;
          } else {
            throw new Error('Session creation failed');
          }
        } catch (e) {
          this.form.order_id   = 'SF-LOCAL';
          this.form.session_id = crypto.randomUUID?.() || 'local-session';
        }

        this.loading = false;

        setInterval(() => {
          if (this.form.status === 'final') return;
          this.form.time_spent += 25;
          this.autoSave();
        }, 25_000);

        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'hidden') {
            if (!this.form.order_id || this.form.order_id === 'SF-LOCAL') return;
            fetch(`${API}/api/lead`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.form),
              keepalive: true
            }).catch(() => {});
          }
        });
      },

      /* ── Language Toggle ──────────────────────────────── */
      toggleLang(toggle = true) {
        if (toggle) {
          this.lang = this.lang === 'ar' ? 'en' : 'ar';
        } else {
          this.lang = 'en';
        }
        document.documentElement.lang = this.lang;
        document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
        localStorage.setItem('saeed_lang', this.lang);
      },

      /* ── autoSave ─────────────────────────────────────── */
      async autoSave() {
        if (!this.form.order_id || this.form.order_id === 'SF-LOCAL') return;
        if (autoSaveController) autoSaveController.abort();
        autoSaveController = new AbortController();
        try {
          await fetch(`${API}/api/lead`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.form),
            signal: autoSaveController.signal
          });
        } catch (_) {}
      },

      calculateScore() {
        let s = 0;
        if (this.form.style_selected)    s += 10;
        if (this.form.capacity_selected) s += 20;
        if (this.form.phone.trim())      s += 80;
        if (this.form.status === 'final') s += 100;
        return s;
      },

      goToStep(next) {
        this.step            = next;
        this.form.last_step  = next;
        this.form.score      = this.calculateScore();
        this.updateProgress();
        document.getElementById('order').scrollIntoView({behavior: 'smooth', block: 'start'});
        this.autoSave();
      },

      updateProgress() {
        const map = { hero: 5, style: 25, capacity: 45, 'soft-phone': 65, form: 82, success: 100 };
        this.progress = map[this.step] ?? 5;
      },

      onWhatsAppClick() {
        this.form.last_step = 'whatsapp-clicked';
        this.autoSave();
      },

      selectStyle(style) {
        if (style.id === 'accessories') {
          this.accessoriesClicked = !this.accessoriesClicked;
          this.form.style_selected = 'Accessories & Steel';
          this.form.last_step = 'accessories-interest';
          this.autoSave();
          return;
        }
        this.accessoriesClicked   = false;
        this.form.style_selected  = style.name;
        this.form.score           = this.calculateScore();
        this.goToStep(style.id === 'modern' ? 'capacity' : 'soft-phone');
      },

      selectCapacity(cap) {
        this.form.capacity_selected = cap.name;
        this.form.score             = this.calculateScore();
        this.goToStep('soft-phone');
      },

      onPhoneInput() {
        clearTimeout(this._phoneTimer);
        this.form.score   = this.calculateScore();
        this._phoneTimer  = setTimeout(() => this.autoSave(), 700);
      },
      onPhoneBlur() {
        clearTimeout(this._phoneTimer);
        this.form.score = this.calculateScore();
        this.autoSave();
      },
      onNameInput() {
        clearTimeout(this._nameTimer);
        this._nameTimer = setTimeout(() => this.autoSave(), 700);
      },
      onCityInput() {
        clearTimeout(this._cityTimer);
        this._cityTimer = setTimeout(() => this.autoSave(), 700);
      },
      onVisionInput() {
        clearTimeout(this._visionTimer);
        this._visionTimer = setTimeout(() => this.autoSave(), 1000);
      },
      proceedToForm() {
        this.form.score = this.calculateScore();
        this.goToStep('form');
      },
      async submitForm() {
        if (this.submitting) return;
        if (autoSaveController) autoSaveController.abort();
        
        if (!this.form.name.trim()) {
          this.submitError = this.lang === 'ar' ? 'الرجاء إدخال اسمك الكريم' : 'Please enter your name';
          return;
        }
        if (!this.form.phone.trim()) {
          this.submitError = this.lang === 'ar' ? 'الرجاء إدخال رقم جوالك' : 'Please enter your phone number';
          return;
        }

        const prevStatus = this.form.status;
        const prevStep = this.form.last_step;

        this.submitError  = '';
        this.submitting   = true;
        this.form.status  = 'final';
        this.form.last_step = 'success';
        this.form.score   = this.calculateScore();

        try {
          const r = await fetch(`${API}/api/lead`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.form)
          });
          const d = await r.json();
          if (d.success) {
            if (d.order_id) this.form.order_id = d.order_id;
            this.goToStep('success');
          } else {
            this.submitError = this.lang === 'ar' ? 'حدث خطأ. يرجى المحاولة مرة أخرى.' : 'Error occurred. Please try again.';
            this.form.status = prevStatus;
            this.form.last_step = prevStep;
          }
        } catch (e) {
          this.submitError = this.lang === 'ar' ? 'تعذّر الاتصال بالخادم. يرجى المحاولة لاحقاً.' : 'Network error. Please try again.';
          this.form.status = prevStatus;
          this.form.last_step = prevStep;
        } finally {
          this.submitting = false;
        }
      }
    };
  }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سعيد للأثاث | Saeed Furniture — مجالس فاخرة</title>
  <meta name="description" content="مجالس فاخرة مصنوعة في المملكة العربية السعودية. تصاميم عصرية وتراثية. زيارة منزلية مجانية.">
  <meta property="og:title"       content="سعيد للأثاث | Luxury Majlis KSA">
  <meta property="og:description" content="أثاث مخصص بتصاميم تناسب قلب منزلك.">
  <meta property="og:type"        content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: {
              DEFAULT: '#c9a96e', // Royal Gold
              light: '#dcc69a',
              dim: 'rgba(201, 169, 110, 0.1)'
            },
            bronze: {
              DEFAULT: '#080809', // Deep Charcoal
              dark: '#000000'
            },
            ivory: {
              DEFAULT: '#FCFBF8', // Elegant Light Background
              darker: '#F5F2EA'
            }
          },
          fontFamily: {
            cairo: ['Cairo', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Carousel snap behavior */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .gold-lines-bg {
      background-image: 
        linear-gradient(45deg, transparent 48%, #c9a96e 49%, #c9a96e 51%, transparent 52%),
        linear-gradient(-45deg, transparent 48%, #c9a96e 49%, #c9a96e 51%, transparent 52%);
      background-size: 200px 200px;
      opacity: 0.05;
    }
    .gold-strip {
      position: absolute;
      background: linear-gradient(to bottom, transparent, #c9a96e, transparent);
      width: 1px;
      height: 100%;
      opacity: 0.1;
      pointer-events: none;
    }

    /* Phase 2 Enhancements */
    @keyframes sweep-shimmer {
      0% { transform: translateX(-100%) skewX(-15deg); opacity: 0; }
      50% { opacity: 0.3; }
      100% { transform: translateX(200%) skewX(-15deg); opacity: 0; }
    }
    .animate-sweep::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
      animation: sweep-shimmer 2s ease-out forwards;
      pointer-events: none;
    }

    @keyframes draw-line {
      from { width: 0; }
      to { width: 100%; }
    }
    .animate-draw-line {
      animation: draw-line 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .arabesque-bg {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path fill="%23c9a96e" d="M50 0C50 25 75 50 100 50C75 50 50 75 50 100C50 75 25 50 0 50C25 50 50 25 50 0Z" opacity="0.03"/></svg>');
      background-size: 100px 100px;
    }

    .rtl-input-line {
      position: relative;
    }
    .rtl-input-line::after {
      content: ''; position: absolute; bottom: 0; right: 0; height: 2px; width: 0;
      background: #c9a96e; transition: width 0.4s ease;
    }
    .rtl-input-line:focus-within::after { width: 100%; }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .animate-pulse-ring::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid #25D366; animation: pulse-ring 2s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes draw-check {
      to { stroke-dashoffset: 0; }
    }
    .animate-draw-check {
      stroke-dasharray: 50; stroke-dashoffset: 50;
      animation: draw-check 1s ease-out forwards;
      animation-delay: 0.3s;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.8s ease-out forwards;
      opacity: 0;
    }
    /* Subtle noise texture overlay */
    .noise-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }
  </style>
  <script defer src="https://unpkg.com/@alpinejs/intersect@3.14.1/dist/cdn.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
</head>
<body class="bg-ivory text-bronze font-cairo antialiased min-h-screen overflow-x-hidden selection:bg-gold/30 selection:text-bronze" x-data="saeedApp()" x-init="init()" @scroll.window="scrolled = (window.pageYOffset > 50)">

  <!-- ── Progress Indicator ──────────────────────────────── -->
  <div class="fixed top-0 inset-x-0 h-[3px] bg-ivory-darker z-[200]" x-show="step !== 'success' && step !== 'hero'">
    <div class="h-full bg-gold transition-all duration-700 ease-out shadow-[0_0_10px_rgba(201,169,110,0.5)]" :style="'width:' + progress + '%'"></div>
  </div>

  <!-- ── Splash Screen (Bilingual Brand) ─────────────────── -->
  <div class="fixed inset-0 flex flex-col items-center justify-center z-[9999]"
       style="background: radial-gradient(ellipse at top, #131318 0%, #080809 55%, #04040a 100%);"
       x-show="loading" x-cloak
       x-transition:leave="transition ease-in-out duration-700"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0">
    <div class="flex flex-col items-center gap-6 animate-[fadeIn_0.8s_ease_forwards]" style="animation: splashIn 0.9s cubic-bezier(0.22,1,0.36,1) forwards;">
      <img src="images/logo.png" alt="Saeed Furniture"
           class="h-16 object-contain"
           style="filter: invert(1) sepia(1) saturate(1.5) hue-rotate(5deg) brightness(1.15);">
      <div class="text-center space-y-2">
        <p class="text-white text-2xl font-bold" style="font-family: 'Noto Kufi Arabic', sans-serif; letter-spacing: 0.05em;">مرحباً بكم في شركة سعيد</p>
        <p class="text-white/40 text-sm font-medium tracking-[0.25em] uppercase">Welcome to Saeed Furniture</p>
      </div>
      <div class="flex gap-2 mt-2">
        <span class="w-1.5 h-1.5 rounded-full bg-[#c9a96e] animate-bounce"></span>
        <span class="w-1.5 h-1.5 rounded-full bg-[#c9a96e] animate-bounce" style="animation-delay: 180ms"></span>
        <span class="w-1.5 h-1.5 rounded-full bg-[#c9a96e] animate-bounce" style="animation-delay: 360ms"></span>
      </div>
    </div>
    <style>
      @keyframes splashIn {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </div>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="fixed top-0 inset-x-0 z-50 h-16 flex items-center justify-between px-5 sm:px-10 transition-all duration-500 bg-[#080809] shadow-sm">
    <div class="h-8 flex items-center gap-3">
      <img src="images/logo.png" alt="Saeed Furniture" class="h-full object-contain" style="filter: invert(1) sepia(1) saturate(1.5) hue-rotate(5deg) brightness(1.1);">
      <span class="text-[0.85rem] font-bold text-white/80"
            style="font-family: 'Noto Kufi Arabic', sans-serif;">شركة سعيد</span>
    </div>
    
    <nav class="hidden md:flex gap-8 text-[0.85rem] font-bold text-white/70 uppercase tracking-widest min-h-[44px] items-center">
      <a href="#about" class="hover:text-gold transition-colors flex items-center min-h-[44px]" x-text="lang === 'ar' ? 'من نحن' : 'About'"></a>
      <a href="#faq" class="hover:text-gold transition-colors flex items-center min-h-[44px]" x-text="lang === 'ar' ? 'الأسئلة الشائعة' : 'FAQ'"></a>
      <a href="#" @click.prevent="scrollToFooter()" class="hover:text-gold transition-colors flex items-center min-h-[44px]" x-text="lang === 'ar' ? 'تواصل معنا' : 'Contact'"></a>
      <button @click="handleOrderClick()" 
              class="hover:text-gold transition-colors flex items-center min-h-[44px] font-bold uppercase tracking-widest text-[0.85rem] text-white/70" 
              x-text="$store.saeedAuth.user ? (lang === 'ar' ? 'طلباتي' : 'My Orders') : (lang === 'ar' ? 'اطلب الآن' : 'Order')">
      </button>
    </nav>
    
    <div class="flex items-center gap-4 flex-shrink-0" dir="ltr">
      <button @click="toggleLang()" class="text-[0.75rem] font-extrabold text-white/70 hover:text-gold transition-colors uppercase tracking-widest px-2 py-1 border border-white/20 rounded bg-white/5 flex-shrink-0">
        <span x-text="lang === 'ar' ? 'EN' : 'AR'"></span>
      </button>
      <!-- Mobile Hamburger -->
      <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden w-10 h-10 flex items-center justify-center text-white/70 hover:text-gold transition-colors">
        <svg x-show="!mobileMenuOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        <svg x-show="mobileMenuOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </header>

  <!-- Mobile Navigation Drawer -->
  <div x-show="mobileMenuOpen" x-cloak
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-[90] bg-[#080809]/95 backdrop-blur-2xl flex flex-col items-center justify-center gap-8 md:hidden">
    <a href="#about" @click="mobileMenuOpen = false" class="text-2xl font-light text-white/70 hover:text-gold transition-colors uppercase tracking-[0.3em]" x-text="lang === 'ar' ? 'من نحن' : 'About'"></a>
    <a href="#faq" @click="mobileMenuOpen = false" class="text-2xl font-light text-white/70 hover:text-gold transition-colors uppercase tracking-[0.3em]" x-text="lang === 'ar' ? 'الأسئلة الشائعة' : 'FAQ'"></a>
    <a href="#" @click.prevent="scrollToFooter(); mobileMenuOpen = false" class="text-2xl font-light text-white/70 hover:text-gold transition-colors uppercase tracking-[0.3em]" x-text="lang === 'ar' ? 'تواصل معنا' : 'Contact'"></a>
    <button @click="handleOrderClick(); mobileMenuOpen = false" class="text-2xl font-light text-gold hover:text-gold/80 transition-colors uppercase tracking-[0.3em]" x-text="$store.saeedAuth.user ? (lang === 'ar' ? 'طلباتي' : 'My Orders') : (lang === 'ar' ? 'اطلب الآن' : 'Order')"></button>
    <div class="w-12 h-[1px] bg-gold/30 my-4"></div>
    <button @click="isSelectionMode = true; step = 'selection'; mobileMenuOpen = false; window.scrollTo({top: 0})" class="px-10 py-4 bg-gold text-[#0a0a0d] rounded-full font-bold uppercase tracking-[0.2em] text-sm hover:shadow-[0_0_40px_rgba(201,169,110,0.5)] transition-all duration-300">
      <span x-text="lang === 'ar' ? 'ابدأ رحلتك' : 'Start Your Journey'"></span>
    </button>
  </div>

  <!-- ── Main Journey ────────────────────────────────────── -->
  <main class="transition-all duration-500 pt-16" x-show="!loading" x-cloak>

    <div x-show="!isSelectionMode" x-transition:enter="transition ease-out duration-700" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
    <!-- ══ HERO SECTION ════════════════════════════════════ -->
    <section id="hero" class="relative min-h-[90vh] flex flex-col items-center justify-center text-center px-5 overflow-hidden animate-sweep">
      <!-- High-res Background Image with Overlay -->
      <div class="absolute inset-0 z-[-1] bg-[#080809]" x-data="{ loaded: true }">
        <img src="images/hero.png" class="w-full h-full object-cover brightness-[0.6] transition-transform duration-[3s] ease-out" :class="loaded ? 'scale-100' : 'scale-110'" alt="Luxury Majlis" x-init="setTimeout(() => loaded = true, 50)">
        <div class="absolute inset-0 bg-gradient-to-t from-[#080809] to-transparent"></div>
      </div>

      <!-- Hero Content -->
      <div class="max-w-[700px] mb-8 mt-16">
        <h1 class="text-5xl md:text-7xl font-extrabold leading-[1.1] text-white mb-6 drop-shadow-2xl" x-text="lang === 'ar' ? content.hero?.titleArabic : 'Luxury Majlis with Authentic Saudi Touch'"></h1>
        <p class="text-xl md:text-2xl text-white/80 leading-relaxed mb-12 max-w-[500px] mx-auto font-medium" x-text="lang === 'ar' ? content.hero?.subtitleArabic : 'Custom furniture built specifically for your home. We serve clients across the Kingdom.'"></p>

      </div>
      
      <!-- Scroll Cue Whisper -->
      <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center transition-opacity duration-500" :class="scrolled ? 'opacity-0' : 'opacity-100'">
        <div class="w-[1px] h-12 bg-gradient-to-b from-transparent via-gold to-gold animate-pulse"></div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="2" class="mt-2 animate-bounce"><path d="M19 12l-7 7-7-7"/></svg>
      </div>
    </section>

    <!-- ══ USP GRID SECTION ════════════════════════════════ -->
    <section id="usp" class="py-20 px-5 bg-white border-b border-ivory-darker arabesque-bg relative">
      <!-- Section Title Fade + Gold Line Reveal -->
      <div class="max-w-[1000px] mx-auto text-center mb-12 opacity-0 translate-y-4 transition-all duration-700" x-intersect="$el.classList.remove('opacity-0', 'translate-y-4')">
        <div class="inline-block relative">
          <div class="w-0 h-[1px] bg-gold absolute -top-4 right-0 transition-all duration-[1.5s] delay-300" x-intersect="$el.classList.add('w-full')"></div>
          <h2 class="text-3xl font-bold text-bronze uppercase tracking-[0.2em]" x-text="lang === 'ar' ? 'مميزاتنا' : 'Our Features'"></h2>
        </div>
      </div>
      
      <div class="max-w-[1000px] mx-auto grid grid-cols-2 md:grid-cols-4 gap-8 opacity-0 translate-y-8 transition-all duration-1000 ease-out" x-intersect="$el.classList.remove('opacity-0', 'translate-y-8')">
        
        <div class="flex flex-col items-center text-center gap-4">
          <div class="w-16 h-16 rounded-full bg-ivory flex items-center justify-center text-gold border border-gold/20 shadow-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          </div>
          <h3 class="text-[0.9rem] font-extrabold text-bronze uppercase tracking-widest" x-text="lang === 'ar' ? 'صنع في السعودية' : 'Made in KSA'"></h3>
        </div>

        <div class="flex flex-col items-center text-center gap-4">
          <div class="w-16 h-16 rounded-full bg-ivory flex items-center justify-center text-gold border border-gold/20 shadow-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          </div>
          <h3 class="text-[0.9rem] font-extrabold text-bronze uppercase tracking-widest" x-text="lang === 'ar' ? 'زيارة منزلية مجانية' : 'Free Home Visit'"></h3>
        </div>

        <div class="flex flex-col items-center text-center gap-4">
          <div class="w-16 h-16 rounded-full bg-ivory flex items-center justify-center text-gold border border-gold/20 shadow-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>
          </div>
          <h3 class="text-[0.9rem] font-extrabold text-bronze uppercase tracking-widest" x-text="lang === 'ar' ? 'ألوان وخامات متعددة' : 'Material & Color Selection'"></h3>
        </div>

        <div class="flex flex-col items-center text-center gap-4">
          <div class="w-16 h-16 rounded-full bg-ivory flex items-center justify-center text-gold border border-gold/20 shadow-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
          </div>
          <h3 class="text-[0.9rem] font-extrabold text-bronze uppercase tracking-widest" x-text="lang === 'ar' ? 'توصيل مجاني' : 'Free Home Delivery'"></h3>
        </div>

      </div>
    </section>

        <!-- ══ ABOUT SECTION (Editorial Magazine Layout) ═══════════════════════════════════ -->
    <section id="about" class="py-32 px-5 bg-ivory-darker border-b border-ivory arabesque-bg relative overflow-hidden">
      <div class="max-w-[1400px] mx-auto opacity-0 translate-y-8 transition-all duration-1000 ease-out" x-intersect="$el.classList.remove('opacity-0', 'translate-y-8')">
        
        <div class="grid lg:grid-cols-[1fr_350px_1fr] xl:grid-cols-[1fr_450px_1fr] gap-12 lg:gap-16 items-start">
          
          <!-- Column 1: Lead-in & P1 -->
          <div class="space-y-8 lg:mt-16 animate-fade-in-up" style="animation-delay: 200ms;">
             <div class="text-[0.65rem] font-bold text-gold tracking-[0.2em] uppercase mb-4" x-text="lang === 'ar' ? 'اكتشف خياراتنا' : 'Explore Our Options'"></div>
             <p class="text-3xl md:text-4xl font-light text-bronze leading-snug tracking-wide" x-text="lang === 'ar' ? 'في شركة سعيد للأثاث، نُعرف بين أفضل صناع أثاث الكنب وخبراء الكنب التفصيل في السعودية.' : 'At Saeed Furniture Company — شركة سعيد للأثاث — we are known among the best sofa furniture makers and custom sofa makers in KSA for creating premium Arabic sofas and reception-room seating.'"></p>
             <div class="w-12 h-[1px] bg-gold my-8"></div>
             <p class="text-lg text-bronze/60 leading-loose font-light" x-text="lang === 'ar' ? 'كل طلب هو عبارة عن طقم كنب مخصص أو جلسة مجلس تفصيل، يُصنع بالكامل كأثاث حسب الطلب في السعودية، مُصمم ليناسب ذوقك ومبني خصيصاً لمنزلك. من الاستشارة الأولى وحتى اللمسة الأخيرة، نتبع نهجاً احترافياً في تصميم الكنب المخصص لإنتاج أثاث مجالس فاخر – طابع شخصي، جودة تدوم، وحرفية ترتقي بتجربة استقبال ضيوفك.' : 'Every commission is a custom-made sofa set or bespoke majlis seating, entirely made-to-order furniture in Saudi Arabia, designed to your taste and built for your home. From the first consultation to the final stitch, we follow a custom sofa design KSA approach that results in luxury majlis furniture – personal, lasting, and crafted to elevate your guest room experience.'"></p>
          </div>

          <!-- Column 2: Center Image Carousel -->
          <div class="w-full h-[600px] rounded-t-full rounded-b-full overflow-hidden shadow-[0_30px_80px_-15px_rgba(201,169,110,0.4)] bg-[#080809] border-4 border-ivory relative group animate-fade-in-up" style="animation-delay: 300ms;" x-data="{ timer: null, next() { this.$refs.carousel.scrollBy({ left: this.$refs.carousel.clientWidth, behavior: 'smooth' }); if(this.$refs.carousel.scrollLeft >= this.$refs.carousel.scrollWidth - this.$refs.carousel.clientWidth - 10) { this.$refs.carousel.scrollTo({ left: 0, behavior: 'smooth' }); } } }" x-init="timer = setInterval(() => next(), 4000)">
            <div x-ref="carousel" class="flex h-full overflow-x-auto snap-x snap-mandatory hide-scrollbar">
              <div class="relative w-full h-full snap-center flex-none" x-data="{ loaded: false }">
                <img src="images/modern.png" loading="lazy" @load="loaded = true" class="absolute inset-0 w-full h-full object-cover transition-all duration-700" :class="loaded ? 'blur-0' : 'blur-md'" alt="Modern">
              </div>
              <div class="relative w-full h-full snap-center flex-none" x-data="{ loaded: false }">
                <img src="images/authentic.png" loading="lazy" @load="loaded = true" class="absolute inset-0 w-full h-full object-cover transition-all duration-700" :class="loaded ? 'blur-0' : 'blur-md'" alt="Authentic">
              </div>

        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
    </a>
  </div>

  <!-- ── Auth Modal (Email/Password) ────────────────────── -->
  <div x-data="{ tab: 'signin', email: '', password: '', showPass: false, loading: false, error: '' }"
       x-show="$store.saeedAuth && $store.saeedAuth.showAuthModal" 
       class="fixed inset-0 z-[200] flex items-center justify-center bg-black/70 backdrop-blur-xl"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 scale-100"
       x-transition:leave-end="opacity-0 scale-95"
       style="display: none;">
    <div class="bg-[#0e0e10] border border-white/10 rounded-3xl p-8 max-w-[420px] w-full mx-4 shadow-[0_32px_80px_rgba(0,0,0,0.8)] relative" @click.stop>
      <button @click="$store.saeedAuth.showAuthModal = false; error = ''" class="absolute top-5 right-5 text-white/30 hover:text-white text-xl transition-colors">&times;</button>
      
      <!-- Logo + Brand Name -->
      <div class="text-center mb-8 pt-2">
        <img src="/images/logo.png" alt="Saeed Furniture" class="h-10 mx-auto object-contain" style="filter: invert(1) sepia(1) saturate(1.5) hue-rotate(5deg) brightness(1.1);">
        <p class="text-white text-lg font-bold mt-3" style="font-family: 'Noto Kufi Arabic', sans-serif;">شركة سعيد</p>
        <p class="text-white/30 text-[0.65rem] mt-1 uppercase tracking-widest" x-text="lang === 'ar' ? 'اتيليه المجالس' : 'Bespoke Majlis Atelier'"></p>
      </div>

      <!-- Tabs -->
      <div class="flex border border-white/10 rounded-2xl p-1 mb-8">
        <button @click="tab = 'signin'; error = ''" 
                :class="tab === 'signin' ? 'bg-white/10 text-white' : 'text-white/40 hover:text-white'"
                class="flex-1 py-2.5 text-xs font-black uppercase tracking-widest rounded-xl transition-all"
                x-text="lang === 'ar' ? 'تسجيل الدخول' : 'Sign In'"></button>
        <button @click="tab = 'signup'; error = ''" 
                :class="tab === 'signup' ? 'bg-white/10 text-white' : 'text-white/40 hover:text-white'"
                class="flex-1 py-2.5 text-xs font-black uppercase tracking-widest rounded-xl transition-all"
                x-text="lang === 'ar' ? 'إنشاء حساب' : 'Create Account'"></button>
      </div>

      <!-- Error -->
      <div x-show="error" x-transition class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-xl px-4 py-3 mb-6 text-center" x-text="error"></div>

      <!-- Fields -->
      <div class="space-y-6">
        <div>
          <label class="block text-[0.7rem] font-bold text-white/30 mb-3 uppercase tracking-widest" x-text="lang === 'ar' ? 'البريد الإلكتروني' : 'Email Address'"></label>
          <input type="email" x-model="email" autocomplete="email"
                 class="w-full bg-transparent border-b border-white/10 pb-3 text-white text-sm outline-none transition-colors duration-300 focus:border-[#c9a96e]"
                 :placeholder="lang === 'ar' ? 'example@email.com' : 'example@email.com'">
        </div>
        <div class="relative">
          <label class="block text-[0.7rem] font-bold text-white/30 mb-3 uppercase tracking-widest" x-text="lang === 'ar' ? 'كلمة المرور' : 'Password'"></label>
          <input :type="showPass ? 'text' : 'password'" x-model="password" autocomplete="current-password"
                 class="w-full bg-transparent border-b border-white/10 pb-3 text-white text-sm outline-none transition-colors duration-300 focus:border-[#c9a96e] pr-10"
                 :placeholder="lang === 'ar' ? '••••••••' : '••••••••'">
          <button type="button" @click="showPass = !showPass" class="absolute right-0 bottom-3 text-white/30 hover:text-white transition-colors">
            <svg x-show="!showPass" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg x-show="showPass" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <!-- Action Button -->
      <button @click="async () => {
        if (!email || !password) { error = lang === 'ar' ? 'يرجى ملء جميع الحقول' : 'Please fill in all fields'; return; }
        loading = true; error = '';
        try {
          let result;
          if (tab === 'signin') {
            result = await $store.saeedAuth.signInWithPassword(email, password);
            if (result.error) {
              error = lang === 'ar' ? 'البريد أو كلمة المرور غير صحيحة' : 'Incorrect email or password. Please try again.';
            } else {
              $store.saeedAuth.showAuthModal = false;
              email = ''; password = ''; error = '';
              if ($store.saeedAuth.pendingAction) {
                $store.saeedAuth.pendingAction();
                $store.saeedAuth.pendingAction = null;
              }
            }
          } else {
            result = await $store.saeedAuth.signUp(email, password);
            if (result.error) {
              const msg = result.error.message || '';
              if (msg.toLowerCase().includes('already registered') || msg.toLowerCase().includes('already exists') || msg.toLowerCase().includes('user already')) {
                error = lang === 'ar' ? 'هذا البريد مسجّل مسبقاً. يرجى التبديل إلى تسجيل الدخول.' : 'This email is already registered. Please switch to Sign In.';
              } else {
                error = msg || (lang === 'ar' ? 'حدث خطأ أثناء إنشاء الحساب' : 'An error occurred during sign up.');
              }
            } else {
              $store.saeedAuth.showAuthModal = false;
              email = ''; password = ''; error = '';
              if ($store.saeedAuth.pendingAction) {
                $store.saeedAuth.pendingAction();
                $store.saeedAuth.pendingAction = null;
              }
            }
          }
        } catch(e) {
          error = lang === 'ar' ? 'حدث خطأ غير متوقع' : 'An unexpected error occurred';
        } finally { loading = false; }
      }" 
      class="w-full mt-8 py-4 rounded-2xl font-black text-sm uppercase tracking-widest transition-all duration-300 flex items-center justify-center gap-3"
      :class="loading ? 'bg-white/10 text-white/40 cursor-not-allowed' : 'bg-[#c9a96e] text-black hover:bg-[#d4b87a]'"
      :disabled="loading">
        <svg x-show="loading" class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <span x-text="loading ? (lang === 'ar' ? 'جاري...' : 'Please wait...') : (tab === 'signin' ? (lang === 'ar' ? 'دخول' : 'Sign In') : (lang === 'ar' ? 'إنشاء الحساب' : 'Create Account'))"></span>
      </button>

      <p class="text-center text-white/20 text-[0.65rem] mt-6 uppercase tracking-widest" x-text="lang === 'ar' ? 'بياناتك آمنة ومحمية' : 'Your data is secure & protected'"></p>
    </div>
  </div>

  <!-- ── App Logic ─────────────────────────────────────────── -->
  <script>
  // Relative URL
  const API = window.location.origin;
  let autoSaveController = null;

  function saeedApp() {
    return {
      /* ── UI State ─────────────────────────────────────── */
      lang:              'ar',
      isSelectionMode:   false,
      step:              'hero', // hero, selection, form, success
      progress:          5,
      loading:           true,
      submitting:        false,
      submitError:       '',
      phoneError:        '',
      accessoriesClicked: false,
      scrolled:          false,
      mobileMenuOpen:    false,
      highlightWhatsApp: false,

      /* ── Content CMS ──────────────────────────────────── */
      content: { brand:{}, hero:{}, usps:[], styles:{options:[]}, capacity:{options:[]}, contact:{}, success:{} },

      /* ── Debounce Timers ──────────────────────────────── */
      _phoneTimer: null,
      _nameTimer:  null,
      _cityTimer:  null,
      _visionTimer: null,

      /* ── Session State Model ──────────────────────────── */
      form: {
        order_id:          null,
        session_id:        null,
        name:              '',
        phone:             '',
        district_city:     '',
        selected_model_id: '',
        capacity_selected: '',
        visit_mode:        'Home Visit',
        vision_notes:      '',
        last_step:         'hero',
        status:            'draft',
        score:             0,
        time_spent:        0,
        source:            'website',
        user_agent:        '',
        referrer:          '',
        company_name:      '',
        preferred_contact_time: 'Morning',
        email:             ''
      },

      /* ── Catalog Hierarchy State ──────────────────────── */
      catalog:           null,
      selectionLevel:    'type', // 'type', 'subtype', 'variation'
      selectedType:      null,
      selectedSubtype:   null,
      selectedVariation: null,
      showOptional:      false,
      lookbookStageVisible: false,
      toastMessage:      '',
      toastVisible:      false,
      swiper:            null,
      
      get lookbookItems() {
        if (!this.catalog || !this.catalog.taxonomy_tree) return [];
        let items = [];
        let imgIndex = 0;
        this.catalog.taxonomy_tree.forEach(type => {
          if(!type.subtypes) return;
          type.subtypes.forEach(subtype => {
            if(!subtype.variations) return;
            subtype.variations.forEach(variation => {
              items.push({
                type: type,
                subtype: subtype,
                variation: variation,
                id: variation.internal_id,
                catalog_item_id: variation.catalog_item_id,
                name: variation.public_display_name,
                typeName: type.public_display_name,
                unsplashUrl: ['images/hero.png','images/modern.png','images/authentic.png','images/heritage.png'][imgIndex++ % 4]
              });
            });
          });
        });
        return items;
      },
      
      shareReference() {
        const text = this.lang === 'ar' 
          ? `مرحباً، أنا مهتم بتصميم هذا المجلس:\nالنمط: ${this.selectedType?.public_display_name}\nالموديل: ${this.selectedVariation?.public_display_name}\nالرمز: ${this.selectedVariation?.internal_id}`
          : `Hello, I'm interested in this design:\nStyle: ${this.selectedType?.public_display_name}\nModel: ${this.selectedVariation?.public_display_name}\nCode: ${this.selectedVariation?.internal_id}`;
        
        if (navigator.share) {
          navigator.share({ title: 'Saeed Furniture Design', text: text }).catch(console.error);
        } else {
          navigator.clipboard.writeText(text);
          this.showToast(this.lang === 'ar' ? 'تم نسخ المرجع إلى الحافظة' : 'Reference copied to clipboard');
        }
      },
      
      showToast(msg) {
        this.toastMessage = msg;
        this.toastVisible = true;
        setTimeout(() => { this.toastVisible = false; }, 3000);
      },
      
      initSwiper() {
        if(this.swiper || typeof Swiper === 'undefined') return;
        this.swiper = new Swiper('.lookbook-swiper', {
          effect: 'coverflow',
          grabCursor: true,
          centeredSlides: true,
          slidesPerView: 'auto',
          spaceBetween: 30,
          coverflowEffect: {
            rotate: 10,
            stretch: 0,
            depth: 150,
            modifier: 1.5,
            slideShadows: true,
          },
          on: {
            sliderMove: () => { 
              if(!this.lookbookStageVisible) this.lookbookStageVisible = true; 
            },
            slideChange: (s) => {
              const items = this.lookbookItems;
              if (items[s.activeIndex]) {
                const item = items[s.activeIndex];
                this.heroImageLoaded = false;
                this.selectedVariation = item.variation;
                this.selectedSubtype = item.subtype;
                this.selectedType = item.type;
              }
            }
          }
        });
        const items = this.lookbookItems;
        if(items.length > 0) {
          this.selectedVariation = items[0].variation;
          this.selectedSubtype = items[0].subtype;
          this.selectedType = items[0].type;
        }
      },
      
      scrollToCategory(typeName) {
        const items = this.lookbookItems;
        const idx = items.findIndex(i => i.typeName === typeName);
        if(idx !== -1 && this.swiper) {
          this.swiper.slideTo(idx);
          this.lookbookStageVisible = true;
        }
      },

      /* ── init ─────────────────────────────────────────── */
      async init() {
        this.form.user_agent = navigator.userAgent;
        this.form.referrer   = document.referrer;
        
        // Load language preference from local storage if exists
        const savedLang = localStorage.getItem('saeed_lang');
        if (savedLang === 'en') {
          this.toggleLang(false);
        }

        try {
          const r = await fetch('./content.json');
          this.content = await r.json();
        } catch (e) { console.error('[CMS]', e); }

        try {
          const r = await fetch('./catalog.json');
          this.catalog = (await r.json()).configurator_data;
        } catch (e) { console.error('[CATALOG]', e); }

        try {
          const r = await fetch(`${API}/api/session`);
          const d = await r.json();
          if (d.success) {
            this.form.order_id   = d.order_id;
            this.form.session_id = d.session_id;
          } else {
            throw new Error('Session creation failed');
          }
        } catch (e) {
          this.form.order_id   = 'SF-LOCAL';
          this.form.session_id = crypto.randomUUID?.() || 'local-session';
        }

        this.loading = false;

        // Watch auth state — smart pre-fill name/phone when user logs in
        this.$watch('$store.saeedAuth.user', (user) => {
          if (user) {
            this.form.email = user.email;
            const auth = Alpine.store('saeedAuth');
            if (!this.form.name  && auth.fullName) this.form.name  = auth.fullName;
            if (!this.form.phone && auth.phone)    this.form.phone = auth.phone;
          }
        });
        // Also pre-fill immediately if already logged in at load time
        Alpine.nextTick(() => {
          const auth = Alpine.store('saeedAuth');
          if (auth?.user) {
            if (!this.form.name  && auth.fullName) this.form.name  = auth.fullName;
            if (!this.form.phone && auth.phone)    this.form.phone = auth.phone;
            this.form.email = auth.user.email || '';
          }
        });

        setInterval(() => {
          if (this.form.status === 'final') return;
          this.form.time_spent += 25;
          this.autoSave();
        }, 25_000);

        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'hidden') {
            if (!this.form.order_id || this.form.order_id === 'SF-LOCAL') return;
            const auth = Alpine.store('saeedAuth');
            const headers = { 'Content-Type': 'application/json' };
            if (auth?.user?.email) headers['x-user-email'] = auth.user.email;
            
            fetch(`${API}/api/lead`, {
              method: 'POST',
              headers: headers,
              body: JSON.stringify(this.form),
              keepalive: true
            }).catch(() => {});
          }
        });
      },

      /* ── Language Toggle ──────────────────────────────── */
      toggleLang(toggle = true) {
        if (toggle) {
          this.lang = this.lang === 'ar' ? 'en' : 'ar';
        } else {
          this.lang = 'en';
        }
        document.documentElement.lang = this.lang;
        document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
        localStorage.setItem('saeed_lang', this.lang);
      },

      /* ── autoSave ─────────────────────────────────────── */
      async autoSave() {
        if (!this.isSelectionMode || !this.form.order_id || this.form.order_id === 'SF-LOCAL' || this.submitting) return;

        // Prevent multiple concurrent saves
        if (autoSaveController) autoSaveController.abort();
        autoSaveController = new AbortController();

        try {
          const auth = Alpine.store('saeedAuth');
          const headers = { 'Content-Type': 'application/json' };
          if (auth?.user?.email) headers['x-user-email'] = auth.user.email;

          await fetch(`${API}/api/lead`, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(this.form),
            signal: autoSaveController.signal
          });
        } catch (e) {
          if (e.name !== 'AbortError') console.warn('[AUTOSAVE] failed');
        }
      },

      calculateScore() {
        let s = 0;
        if (this.form.style_selected || this.form.selected_model_id) s += 10;
        if (this.form.capacity_selected) s += 20;
        if (this.form.phone.trim())      s += 80;
        if (this.form.status === 'final') s += 100;
        return s;
      },

      goToStep(next) {
        this.step            = next;
        this.form.last_step  = next;
        this.form.score      = this.calculateScore();
        this.updateProgress();
        // Scroll handled by fixed overlay positioning — no DOM scroll needed
        this.autoSave();
      },

      updateProgress() {
        const map = { hero: 5, selection: 45, form: 82, success: 100 };
        this.progress = map[this.step] ?? 5;
      },

      onWhatsAppClick() {
        this.form.last_step = 'whatsapp-clicked';
        this.autoSave();
      },

      selectStyle(style) {
        if (style.id === 'accessories') {
          this.accessoriesClicked = !this.accessoriesClicked;
          this.form.style_selected = 'Accessories & Steel';
          this.form.last_step = 'accessories-interest';
          this.autoSave();
          return;
        }
        this.accessoriesClicked   = false;
        this.form.style_selected  = style.name;
        this.form.score           = this.calculateScore();
        this.goToStep(style.id === 'modern' ? 'capacity' : 'soft-phone');
      },

      selectCapacity(cap) {
        this.form.capacity_selected = cap.name;
        this.form.score             = this.calculateScore();
        this.goToStep('soft-phone');
      },

      onPhoneInput() {
        clearTimeout(this._phoneTimer);
        this.form.score   = this.calculateScore();
        this._phoneTimer  = setTimeout(() => this.autoSave(), 700);
      },
      onPhoneBlur() {
        clearTimeout(this._phoneTimer);
        this.form.score = this.calculateScore();
        this.autoSave();
      },
      onNameInput() {
        clearTimeout(this._nameTimer);
        this._nameTimer = setTimeout(() => this.autoSave(), 700);
      },
      onCityInput() {
        clearTimeout(this._cityTimer);
        this._cityTimer = setTimeout(() => this.autoSave(), 700);
      },
      onVisionInput() {
        clearTimeout(this._visionTimer);
        this._visionTimer = setTimeout(() => this.autoSave(), 1000);
      },
      proceedToForm() {
        this.form.score = this.calculateScore();
        this.goToStep('form');
      },

      /* ── Order Button Handler (Auth Gate) ─────────────── */
      handleOrderClick() {
        const auth = Alpine.store('saeedAuth');
        if (!auth.user) {
          auth.showAuthModal = true;
          auth.pendingAction = () => { window.location.href = '/dashboard/client'; };
        } else {
          window.location.href = '/dashboard/client';
        }
      },
      async submitForm() {
        if (this.submitting) return;
        const auth = Alpine.store('saeedAuth');
        
        // Require Authentication
        if (!auth.user) {
          auth.pendingAction = () => { this.submitForm(); };
          auth.showAuthModal = true;
          return;
        }

        if (!this.form.name.trim()) {
          this.submitError = this.lang === 'ar' ? 'الرجاء إدخال اسمك الكريم' : 'Please enter your name';
          return;
        }
        const digits = this.form.phone.replace(/\D/g, '');
        if (!this.form.phone.trim() || digits.length < 9) {
          this.phoneError = this.lang === 'ar' ? 'يرجى إدخال رقم جوال صحيح (9 أرقام على الأقل)' : 'Please enter a valid phone number (min 9 digits)';
          this.submitError = this.phoneError;
          return;
        }
        this.phoneError = '';

        const prevStatus = this.form.status;
        const prevStep = this.form.last_step;

        this.submitError  = '';
        this.submitting   = true;
        this.form.status  = 'final';
        this.form.last_step = 'success';
        this.form.score   = this.calculateScore();

        try {
          const { data, error } = await auth.supabase
            .from('orders')
            .insert({
              client_id: auth.user.id,
              configuration_details: this.form,
              status: 'new'
            });

          if (error) throw error;

          // Background: upsert name+phone into profiles for next visit
          auth.supabase.from('profiles').update({
            full_name: this.form.name,
            phone:     this.form.phone
          }).eq('id', auth.user.id).then(() => {
            Alpine.store('saeedAuth').fullName = this.form.name;
            Alpine.store('saeedAuth').phone    = this.form.phone;
          });

          // Sync with local backend for dashboard parity
          await this.autoSave();
          
          window.location.href = '/dashboard/client';
        } catch (e) {
          console.error('Submission error:', e);
          this.submitError = this.lang === 'ar' ? 'تعذّر حفظ الطلب. يرجى المحاولة لاحقاً.' : 'Failed to save order. Please try again.';
          this.form.status = prevStatus;
          this.form.last_step = prevStep;
          this.submitting = false;
        } finally {
          this.submitting = false;
        }
      },

      /* ── Selection Logic (OPEN — no auth gate) ───────── */
      selectType(type) {
        this.selectedType = type;
        this.selectionLevel = 'subtype';
        this.autoSave();
      },
      selectSubtype(subtype) {
        this.selectedSubtype = subtype;
        if (subtype.variations && subtype.variations.length === 1) {
          this.selectVariation(subtype.variations[0]);
        } else {
          this.selectionLevel = 'variation';
        }
        this.autoSave();
      },
      selectVariation(variation) {
        this.selectedVariation = variation;
        this.form.selected_model_id = `${this.selectedType.public_display_name} - ${variation.public_display_name}`;
        
        // Map to legacy fields for scoring/backend compatibility
        this.form.style_selected = this.selectedType.public_display_name;
        this.form.capacity_selected = this.selectedSubtype.public_display_name;
        
        this.goToStep('form');
        this.autoSave();
      },
      closeSelectionMode() {
        this.isSelectionMode = false;
        this.step = 'hero';
        this.selectionLevel = 'type';
        this.selectedType = null;
        this.selectedSubtype = null;
        this.selectedVariation = null;
        window.scrollTo({top: 0, behavior: 'smooth'});
      },
      goBack() {
        if (this.step === 'form') {
          this.step = 'selection';
          this.lookbookStageVisible = true;
          return;
        }
        if (this.step === 'selection') {
          if (this.lookbookStageVisible) {
            this.lookbookStageVisible = false;
          } else {
            this.closeSelectionMode();
          }
        }
      },
      scrollToFooter() {
        const footer = document.getElementById('footer');
        if (footer) {
          footer.scrollIntoView({ behavior: 'smooth' });
          this.highlightWhatsApp = true;
          setTimeout(() => this.highlightWhatsApp = false, 3000);
        }
      },
      
      get selectedItemData() {
        if (!this.selectedVariation || !this.catalog) return null;
        return this.catalog.catalog.find(i => i.id === this.selectedVariation.catalog_item_id);
      }
    };
  }
  </script>

  <!-- Toast Notification (Luxury) -->
  <div x-show="toastVisible" x-cloak
       x-transition:enter="transition ease-out duration-500"
       x-transition:enter-start="opacity-0 translate-y-8"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-300"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-8"
       class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[9000] px-8 py-3.5 bg-[#111114]/90 backdrop-blur-xl border border-gold/30 rounded-full shadow-[0_8px_30px_rgba(201,169,110,0.2)] flex items-center gap-3">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
    <span class="text-white/80 text-sm font-bold" x-text="toastMessage"></span>
  </div>

</body>

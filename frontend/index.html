<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Saeed Furniture | Master Showroom Gateway</title>
  <meta name="description" content="Explore the Saeed Furniture digital showroom. Luxury made-to-order majlis, kitchens, bedrooms, cots, and almirahs crafted in Saudi Arabia.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dist/output.css">
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }

    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 8px 2px rgba(255,255,255,0.6); }
      50% { transform: scale(1.6); opacity: 0.4; box-shadow: 0 0 20px 8px rgba(255,255,255,0.2); }
    }
    .dot-pulse {
      animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    /* Tooltip label */
    .map-label {
      position: absolute;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      pointer-events: none;
      transform: translate(-50%, -200%);
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .dot-wrapper:hover .map-label { opacity: 1; }
  </style>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body class="m-0 p-0 overflow-x-hidden bg-stone-950 font-sans" x-data="{ lang: 'en' }">

  <!-- ── Global Header ─────────────────────────────── -->
  <header class="absolute top-0 inset-x-0 z-50 flex justify-between items-center p-8 text-white pointer-events-none">
    <div class="font-bold text-2xl tracking-widest text-amber-500 pointer-events-auto drop-shadow-md flex items-center gap-3">
      <svg class="w-8 h-8 fill-amber-500" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 4.5l7 14h-14l7-14z"/></svg>
      SAEED FURNITURE
    </div>
    <nav class="hidden md:flex gap-8 text-sm tracking-widest pointer-events-auto drop-shadow-md font-medium">
      <a href="#" class="hover:text-amber-400 transition-colors duration-500">ABOUT</a>
      <a href="#" class="hover:text-amber-400 transition-colors duration-500">FAQ</a>
      <a href="#" class="hover:text-amber-400 transition-colors duration-500">CONTACT</a>
    </nav>
  </header>

  <!-- ── Master Gateway: Full Viewport Hero ────────── -->
  <main class="relative w-full h-screen overflow-hidden">

    <!-- LAYER 0: Day Room Hero Image -->
    <img
      src="https://ik.imagekit.io/de7qvcvqv/images/Day%20room%20Hero?updatedAt=1779819466896"
      class="absolute inset-0 w-full h-full object-cover z-0"
      alt="Master Showroom Gateway"
    />

    <!-- LAYER 1: Very subtle gradient overlay for header legibility only -->
    <div class="absolute inset-x-0 top-0 h-40 bg-gradient-to-b from-black/50 to-transparent z-10 pointer-events-none"></div>
    <!-- Subtle bottom gradient for CTA text legibility -->
    <div class="absolute inset-x-0 bottom-0 h-32 bg-gradient-to-t from-black/40 to-transparent z-10 pointer-events-none"></div>

    <!-- LAYER 2: Pulsing Discoverability Dots (z-30, above SVG) -->
    <!-- Majlis center approx (25%, 75%) -->
    <div class="dot-wrapper absolute z-30" style="left: 25%; top: 75%;">
      <div class="dot-pulse absolute w-3 h-3 bg-white/90 rounded-full shadow-[0_0_15px_white]" style="transform: translate(-50%, -50%);"></div>
      <span class="map-label" style="left:0; top:0;">Majlis</span>
    </div>

    <!-- Kitchen center approx (52.5%, 35%) -->
    <div class="dot-wrapper absolute z-30" style="left: 52.5%; top: 35%;">
      <div class="dot-pulse absolute w-3 h-3 bg-white/90 rounded-full shadow-[0_0_15px_white]" style="transform: translate(-50%, -50%);"></div>
      <span class="map-label" style="left:0; top:0;">Kitchen</span>
    </div>

    <!-- Cot center approx (70%, 62.5%) -->
    <div class="dot-wrapper absolute z-30" style="left: 70%; top: 62.5%;">
      <div class="dot-pulse absolute w-3 h-3 bg-white/90 rounded-full shadow-[0_0_15px_white]" style="transform: translate(-50%, -50%);"></div>
      <span class="map-label" style="left:0; top:0;">Cot</span>
    </div>

    <!-- Bedroom center approx (87.5%, 65%) -->
    <div class="dot-wrapper absolute z-30" style="left: 87.5%; top: 65%;">
      <div class="dot-pulse absolute w-3 h-3 bg-white/90 rounded-full shadow-[0_0_15px_white]" style="transform: translate(-50%, -50%);"></div>
      <span class="map-label" style="left:0; top:0;">Bedroom</span>
    </div>

    <!-- Almirah center approx (77.5%, 35%) -->
    <div class="dot-wrapper absolute z-30" style="left: 77.5%; top: 35%;">
      <div class="dot-pulse absolute w-3 h-3 bg-white/90 rounded-full shadow-[0_0_15px_white]" style="transform: translate(-50%, -50%);"></div>
      <span class="map-label" style="left:0; top:0;">Almirah</span>
    </div>

    <!-- LAYER 3: Transparent SVG Polygon Hit-Map (z-20) -->
    <svg
      class="absolute inset-0 w-full h-full z-20 pointer-events-none"
      viewBox="0 0 100 100"
      preserveAspectRatio="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <!-- Majlis -->
      <a href="/majlis.html" class="pointer-events-auto">
        <polygon
          points="0,50 50,50 50,100 0,100"
          fill="rgba(0,0,0,0)"
          class="cursor-pointer hover:fill-white/15 transition-all duration-500 ease-in-out"
        />
      </a>

      <!-- Kitchen -->
      <a href="/kitchen.html" class="pointer-events-auto">
        <polygon
          points="40,25 65,25 65,45 40,45"
          fill="rgba(0,0,0,0)"
          class="cursor-pointer hover:fill-white/15 transition-all duration-500 ease-in-out"
        />
      </a>

      <!-- Cot -->
      <a href="/cot.html" class="pointer-events-auto">
        <polygon
          points="65,55 75,55 75,70 65,70"
          fill="rgba(0,0,0,0)"
          class="cursor-pointer hover:fill-white/15 transition-all duration-500 ease-in-out"
        />
      </a>

      <!-- Bedroom -->
      <a href="/bedroom.html" class="pointer-events-auto">
        <polygon
          points="75,50 100,50 100,80 75,80"
          fill="rgba(0,0,0,0)"
          class="cursor-pointer hover:fill-white/15 transition-all duration-500 ease-in-out"
        />
      </a>

      <!-- Almirah -->
      <a href="/almirah.html" class="pointer-events-auto">
        <polygon
          points="70,20 85,20 85,50 70,50"
          fill="rgba(0,0,0,0)"
          class="cursor-pointer hover:fill-white/15 transition-all duration-500 ease-in-out"
        />
      </a>
    </svg>

    <!-- LAYER 4: Bottom CTA hint -->
    <div class="absolute bottom-10 inset-x-0 z-30 flex flex-col items-center gap-2 pointer-events-none">
      <p class="text-white/60 text-xs tracking-[0.3em] uppercase font-medium drop-shadow">Hover the room to explore</p>
      <svg class="w-5 h-5 text-white/40 animate-bounce" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M19 9l-7 7-7-7"/>
      </svg>
    </div>

  </main>

  <!-- ── Footer ─────────────────────────────────────── -->
  <footer class="bg-stone-950 py-12 px-8 text-center text-stone-500 text-xs tracking-widest uppercase border-t border-stone-800">
    <div class="flex justify-center mb-6">
      <svg class="w-6 h-6 fill-amber-500/50" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 4.5l7 14h-14l7-14z"/></svg>
    </div>
    <p class="text-stone-400 font-medium mb-1">Saeed Furniture — Al Qurayyat, Al Jawf, KSA</p>
    <p class="text-stone-600 mt-4">&copy; 2026 Saeed Furniture. All Rights Reserved.</p>
  </footer>

</body>
</html>

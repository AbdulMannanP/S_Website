    /* â”€â”€â”€ Card â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .pf-card {
      break-inside: avoid;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
      cursor: pointer;
      background: #d4c4b0;
      box-shadow: 0 4px 20px rgba(92,61,46,0.08);
      transition: transform 0.5s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.5s;
    }
    .pf-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 20px 60px rgba(92,61,46,0.18);
    }
    .pf-card img {
      width: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.2,0.8,0.2,1);
    }
    .pf-card:hover img { transform: scale(1.04); }

    /* Card text overlay */
    .pf-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(26,15,10,0.08) 0%, rgba(26,15,10,0.65) 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
      opacity: 1;
      transition: opacity 0.4s;
    }

    /* Card top: logo mark */
    .pf-card-logo {
      width: 36px;
      height: auto;
      opacity: 0.9;
      filter: brightness(0) invert(1);
    }
    .pf-card-logo-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      margin-top: 2px;
    }

    /* Card bottom: text */
    .pf-card-bottom {}
    .pf-card-tag {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 6px;
    }
    .pf-card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 400;
      color: white;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .pf-card-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(201,169,110,0.85);
      border-radius: 100px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: white;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
      backdrop-filter: blur(8px);
    }
    .pf-card-cta:hover { background: rgba(201,169,110,1); }

    /* Featured card (full-width span) */
    .pf-card.featured {
      break-inside: avoid;
    }

    /* â”€â”€â”€ Lightbox â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .pf-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(26,15,10,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .pf-lightbox-inner {
      position: relative;
      max-width: 900px;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      background: #1a1a1a;
    }
    .pf-lightbox-img {
      width: 100%;
      max-height: 75vh;
      object-fit: cover;
      display: block;
    }
    .pf-lightbox-info {
      padding: 24px 32px 28px;
    }
    .pf-lightbox-tag {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--warm);
      margin-bottom: 8px;
    }
    .pf-lightbox-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: rgba(245,237,224,0.95);
      margin-bottom: 8px;
    }
    .pf-lightbox-desc {
      font-size: 0.85rem;
      color: rgba(245,237,224,0.6);
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .pf-lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(26,15,10,0.5);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      transition: background 0.3s;
    }
    .pf-lightbox-close:hover { background: var(--warm); }

    .pf-lightbox-wa {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #25d366;
      border-radius: 100px;
      color: white;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .pf-lightbox-wa:hover { opacity: 0.85; }

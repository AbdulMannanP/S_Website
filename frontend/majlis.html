<!DOCTYPE html>
<html lang="ar" :lang="lang" :dir="lang === 'ar' ? 'rtl' : 'ltr'" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Saeed Furniture | Majlis Collection — Bespoke Saudi Majlis</title>
  <meta name="description" content="Bespoke Saudi majlis crafted to reflect your unique character. Explore 7 signature designs.">
  <meta property="og:title" content="Saeed Furniture | Luxury Majlis KSA">
  <meta property="og:description" content="اختر مجلسك المثالي من تشكيلتنا الحصرية.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://ik.imagekit.io">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Noto+Kufi+Arabic:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/auth.js"></script>
  <link rel="stylesheet" href="/dist/output.css">

  <style>
    html { scroll-behavior: smooth; }
    [x-cloak] { display: none !important; }

    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .animate-pulse-ring { position: relative; }
    .animate-pulse-ring::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid #25D366;
      animation: pulse-ring 2s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up   { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
    .fade-up-1 { animation-delay: 0.1s; }
    .fade-up-2 { animation-delay: 0.3s; }
    .fade-up-3 { animation-delay: 0.5s; }

    /* Catalog card */
    .model-card {
      position: relative; overflow: hidden; cursor: pointer;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      transition: all 0.35s ease;
    }
    .model-card:hover { transform: translateY(-4px); border-color: rgba(201,169,110,0.35); }
    .model-card img   { width:100%; height:220px; object-fit:cover; transition: transform 0.5s ease; display:block; }
    .model-card:hover img { transform: scale(1.05); }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 80;
      background: rgba(0,0,0,0.78); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-box {
      background: #0e0e11; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; width: 100%; max-width: 860px; max-height: 90vh;
      overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr;
      position: relative;
    }
    @media (max-width: 640px) { .modal-box { grid-template-columns: 1fr; } }
    .carousel-track {
      overflow: hidden; position: relative; background: #000;
      border-radius: 16px 0 0 16px; min-height: 320px;
    }
    @media (max-width:640px) { .carousel-track { border-radius: 16px 16px 0 0; min-height: 240px; } }
    .carousel-img {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; transition: opacity 0.5s ease;
    }

    /* Order overlay */
    .order-overlay {
      position: fixed; inset: 0; z-index: 90; overflow-y: auto;
      background: #080809;
    }
    .gold-input {
      width:100%; background:transparent; border:none;
      border-bottom:1px solid rgba(201,169,110,0.2); padding-bottom:10px;
      color:#f5f0e8; font-size:1rem; outline:none;
      transition: border-color .3s; font-family:'Cairo',sans-serif;
    }
    .gold-input:focus { border-color:#c9a96e; }
    .gold-input::placeholder { color: rgba(255,255,255,0.2); }
    .gold-label {
      display:block; font-size:.6rem; font-weight:700; color:rgba(201,169,110,0.5);
      text-transform:uppercase; letter-spacing:.25em; margin-bottom:12px;
    }
    .time-toggle {
      display:flex;
      background: rgba(0,0,0,.6);
      border-radius:10px; padding:4px;
      border:1px solid rgba(201,169,110,.15);
    }
    .time-btn {
      flex:1; padding:11px 6px; font-size:.7rem; font-weight:700;
      text-align:center; border-radius:6px; transition:all .3s;
      cursor:pointer; color:rgba(255,255,255,.35);
      border:none; background:transparent; font-family:'Cairo',sans-serif;
    }
    .time-btn.active { background: linear-gradient(135deg,#92400e,#b45309); color:#fff; box-shadow: 0 4px 16px rgba(180,83,9,.35); }

    /* Exit popup */
    .exit-overlay {
      position:fixed; inset:0; z-index:100;
      background: #06060a;
      display:flex; align-items:center; justify-content:center;
      overflow: hidden;
    }

    /* Luxury shimmer on cards */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .luxury-card {
      position: relative;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(201,169,110,0.04) 100%);
      border: 1px solid rgba(201,169,110,0.12);
      border-radius: 20px;
      transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
      overflow: hidden;
    }
    .luxury-card::before {
      content:'';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201,169,110,0.06), transparent);
      transition: left 0.7s ease;
    }
    .luxury-card:hover::before { left: 150%; }
    .luxury-card:hover {
      border-color: rgba(201,169,110,0.4);
      box-shadow: 0 0 40px rgba(201,169,110,0.1), 0 20px 60px rgba(0,0,0,0.5);
      transform: translateY(-3px);
    }

    /* Pop animations */
    @keyframes fadeSlideUp {
      from { opacity:0; transform: translateY(28px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes goldPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(201,169,110,0); }
      50%      { box-shadow: 0 0 20px 4px rgba(201,169,110,0.2); }
    }
    @keyframes ornamentExpand {
      from { width:0; opacity:0; }
      to   { width:3rem; opacity:1; }
    }
    .pop-1 { animation: fadeSlideUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
    .pop-2 { animation: fadeSlideUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.22s both; }
    .pop-3 { animation: fadeSlideUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.34s both; }
    .pop-4 { animation: fadeSlideUp 0.65s cubic-bezier(0.16,1,0.3,1) 0.46s both; }
    .ornament { animation: ornamentExpand 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
    .gold-pulse { animation: goldPulse 3s ease-in-out infinite; }

    /* feature card */
    .feature-card { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07); border-radius:2px; transition:all .4s ease; }
    .feature-card:hover { background:rgba(255,255,255,.06); border-color:rgba(201,169,110,.3); transform:translateY(-2px); }
  </style>

  <script defer src="/js/app.js"></script>
  <script defer src="js/majlisPage.js?v=8"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>

<!-- ─────────────────────────────────────────────────────────────
     BODY
───────────────────────────────────────────────────────────── -->
<body
  x-data="{ ...saeedApp(), ...majlisPage() }"
  x-init="init(); majlisInit();"
  class="bg-slate-900">

  <!-- ══════════════════════════════════════════════
       HEADER — identical to kitchen.html
  ══════════════════════════════════════════════════ -->
  <header class="fixed top-0 inset-x-0 z-50 h-20 flex items-center justify-between px-6 sm:px-12 transition-all duration-700 ease-in-out border-b border-transparent"
          :class="scrolled ? 'bg-neutral-900/80 backdrop-blur-md shadow-2xl border-white/5' : 'bg-transparent border-transparent'">
    <a href="/" class="h-10 flex items-center gap-4 transition-transform duration-500 hover:scale-105">
      <img :src="IMAGE_BASE_URL + 'images/logo.png'" loading="eager" alt="Saeed Furniture"
           class="h-full object-contain"
           style="filter: invert(1) sepia(1) saturate(1.5) hue-rotate(5deg) brightness(1.2);">
    </a>

    <nav class="hidden md:flex items-center gap-6 text-[0.75rem] font-bold text-white/60 uppercase tracking-[0.12em] min-h-[44px]">
      <a href="/index.html#about"  class="hover:text-amber-500 transition-colors flex items-center min-h-[44px]" x-text="lang === 'ar' ? 'من نحن' : 'About'"></a>
      <a href="/"                  class="hover:text-amber-500 transition-colors flex items-center min-h-[44px]" x-text="lang === 'ar' ? 'المعرض' : 'Showroom'"></a>
      <a href="/select.html"       class="hover:text-amber-500 transition-colors flex items-center min-h-[44px]" x-text="lang === 'ar' ? 'التشكيلات' : 'Collections'"></a>
      <a href="/contact.html"      class="hover:text-amber-500 transition-colors flex items-center min-h-[44px]" x-text="lang === 'ar' ? 'تواصل' : 'Contact'"></a>
      <button @click="handleOrderClick()"
              class="text-amber-500 hover:text-white transition-colors flex items-center min-h-[44px] font-bold uppercase tracking-[0.12em] text-[0.75rem]"
              x-text="$store.saeedAuth?.user ? (lang === 'ar' ? 'طلباتي' : 'My Orders') : (lang === 'ar' ? 'اطلب الآن' : 'Order')">
      </button>
    </nav>

    <div class="flex items-center gap-4 flex-shrink-0" dir="ltr">
      <div class="flex items-center bg-white/10 backdrop-blur-md rounded-full p-1 border border-white/20" dir="ltr">
        <button @click="lang = 'en'" :class="lang === 'en' ? 'bg-[#c9a96e] text-white' : 'text-white/60 hover:text-white'"
                class="px-4 py-3 min-h-[44px] text-[0.6rem] font-bold tracking-[0.2em] uppercase rounded-full transition-all duration-300">EN</button>
        <button @click="lang = 'ar'" :class="lang === 'ar' ? 'bg-[#c9a96e] text-white' : 'text-white/60 hover:text-white'"
                class="px-4 py-3 min-h-[44px] text-[0.65rem] font-bold rounded-full transition-all duration-300 font-cairo">عربي</button>
      </div>
      <button @click="mobileMenuOpen = !mobileMenuOpen" aria-label="Toggle Mobile Menu"
              class="md:hidden w-10 h-10 flex items-center justify-center text-white/70 hover:text-amber-500 transition-colors">
        <svg x-show="!mobileMenuOpen" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <svg x-show="mobileMenuOpen" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </header>

  <!-- Mobile Drawer -->
  <div x-show="mobileMenuOpen" x-cloak
       x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-[90] bg-neutral-900/98 backdrop-blur-2xl flex flex-col items-center justify-center gap-8 md:hidden">
    <a href="/index.html#about" @click="mobileMenuOpen=false" class="text-xl font-light text-white/70 hover:text-amber-500 transition-colors uppercase tracking-[0.3em]" x-text="lang==='ar'?'من نحن':'About'"></a>
    <a href="/"                 @click="mobileMenuOpen=false" class="text-xl font-light text-white/70 hover:text-amber-500 transition-colors uppercase tracking-[0.3em]" x-text="lang==='ar'?'المعرض':'Showroom'"></a>
    <a href="/select.html"      @click="mobileMenuOpen=false" class="text-xl font-light text-white/70 hover:text-amber-500 transition-colors uppercase tracking-[0.3em]" x-text="lang==='ar'?'التشكيلات':'Collections'"></a>
    <a href="/contact.html"     @click="mobileMenuOpen=false" class="text-xl font-light text-white/70 hover:text-amber-500 transition-colors uppercase tracking-[0.3em]" x-text="lang==='ar'?'تواصل':'Contact'"></a>
    <button @click="handleOrderClick(); mobileMenuOpen=false" class="text-2xl font-light text-amber-500 hover:text-amber-400 transition-colors uppercase tracking-[0.3em]" x-text="lang==='ar'?'اطلب الآن':'Order Now'"></button>
  </div>

  <!-- Back Button -->
  <a href="/" class="fixed top-24 start-6 z-50 px-4 py-2 bg-white/5 text-slate-300 backdrop-blur-md rounded-lg border border-white/10 hover:bg-amber-700/20 hover:border-amber-700/30 transition-all font-cairo flex items-center gap-2 text-sm">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="rtl:rotate-180"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    <span x-text="lang==='ar'?'رجوع للرئيسية':'Back'"></span>
  </a>


  <!-- ══════════════════════════════════════════════
       HERO — full viewport, centered text
       Same pattern as kitchen.html / cot.html
  ══════════════════════════════════════════════════ -->
  <section class="relative w-full h-screen overflow-hidden">
    <!-- Hero image — first catalog item -->
    <img :src="getImageUrl(selectedModel ? selectedModel.thumb : 'images/catalog/item_001.png')"
         fetchpriority="high"
         width="1920" height="1080"
         class="absolute inset-0 w-full h-full object-cover z-0 transition-opacity duration-700"
         alt="Majlis Collection">
    <div class="absolute inset-0 bg-gradient-to-b from-slate-900/60 via-slate-900/20 to-slate-900/90 z-10"></div>

    <!-- Centered hero text -->
    <div class="absolute inset-0 z-20 flex flex-col items-center justify-end pb-24 text-center px-8">
      <p class="text-xs uppercase tracking-[0.4em] text-amber-500 mb-4 fade-up fade-up-1"
         x-text="lang==='ar' ? 'تشكيلة المجالس' : 'Majlis Collection'"></p>
      <h1 class="text-5xl md:text-7xl font-light text-white mb-6 leading-tight fade-up fade-up-2"
          style="font-family:'Playfair Display',serif;">
        <span x-show="lang !== 'ar'">The <em class="text-amber-500" style="font-style:italic;" x-text="selectedModel ? selectedModel.name : 'Majlis'"></em></span>
        <span x-show="lang === 'ar'" style="font-family:'Noto Kufi Arabic',sans-serif;">تشكيلة المجالس</span>
      </h1>
      <p class="text-slate-300/80 max-w-xl text-lg fade-up fade-up-3"
         x-text="selectedModel ? selectedModel.description : 'Bespoke Saudi majlis crafted to reflect your unique character.'"></p>
      <div class="mt-10 flex items-center gap-6 fade-up fade-up-3">
        <button @click="openOrderForm()"
                class="px-8 py-4 bg-amber-600 text-slate-900 font-bold shadow-lg hover:bg-amber-500 transition-all duration-300 uppercase tracking-[0.2em] text-sm">
          <span x-text="lang==='ar' ? 'طلب تصميم' : 'Request Bespoke'"></span>
        </button>
        <a href="#catalog" class="text-slate-400 hover:text-white transition-colors text-sm uppercase tracking-widest flex items-center gap-2">
          <span x-text="lang==='ar' ? 'كل التشكيلات' : 'All Collections'"></span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="rtl:rotate-180"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    </div>
  </section>


  <!-- ══════════════════════════════════════════════
       CATALOG SECTION — 7-model grid
  ══════════════════════════════════════════════════ -->
  <section id="catalog" class="py-24 bg-slate-900">
    <div class="max-w-7xl mx-auto px-6 sm:px-8">

      <div class="flex items-center gap-4 mb-6">
        <div class="w-8 h-px bg-amber-600"></div>
        <span class="text-xs uppercase tracking-[0.35em] text-amber-600 font-bold"
              x-text="lang==='ar' ? 'المجموعة الكاملة' : 'The Full Collection'"></span>
      </div>
      <h2 class="text-3xl md:text-4xl font-light text-slate-200 mb-4"
          style="font-family:'Playfair Display',serif;"
          x-text="lang==='ar' ? 'اختر مجلسك' : 'Choose Your Majlis'"></h2>
      <p class="text-slate-500 text-base mb-16 max-w-xl"
         x-text="lang==='ar' ? 'سبعة تصاميم حصرية، كل واحد يحكي قصة مختلفة.' : 'Seven exclusive designs, each telling a different story. Click to explore and order.'"></p>

      <div class="flex flex-col gap-16">
        <template x-for="groupData in catalogGroups" :key="groupData.group">
          <div class="group-section" x-data="{ activeIndex: 0, 
            nextSlide() { this.activeIndex = (this.activeIndex + 1) % groupData.models.length; },
            prevSlide() { this.activeIndex = (this.activeIndex - 1 + groupData.models.length) % groupData.models.length; }
          }">
            <div class="flex items-center gap-4 mb-4">
              <div class="h-px bg-amber-600/30 flex-1"></div>
              <h3 class="text-2xl font-light text-slate-200" style="font-family:'Playfair Display',serif;" x-text="groupData.group"></h3>
              <div class="h-px bg-amber-600/30 flex-1"></div>
            </div>
            
            <div class="relative rounded-2xl overflow-hidden bg-slate-800/50 aspect-video md:aspect-[21/9] border border-white/5">
              <!-- Carousel Images -->
              <template x-for="(model, idx) in groupData.models" :key="model.id">
                <div x-show="activeIndex === idx"
                     x-transition:enter="transition-opacity duration-500 ease-out"
                     x-transition:enter-start="opacity-0"
                     x-transition:enter-end="opacity-100"
                     x-transition:leave="transition-opacity duration-300 ease-in absolute inset-0"
                     x-transition:leave-start="opacity-100"
                     x-transition:leave-end="opacity-0"
                     class="w-full h-full cursor-pointer"
                     @click="openModal(model)">
                  <img :src="getImageUrl(model.thumb)" :alt="model.name" loading="lazy" class="w-full h-full object-cover">
                </div>
              </template>

              <!-- Controls (only show if multiple items) -->
              <div x-show="groupData.models.length > 1">
                <button @click="prevSlide()" class="absolute start-4 top-1/2 -translate-y-1/2 z-10 w-10 h-10 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center text-white hover:bg-black/80 hover:scale-105 transition-all border border-white/10 shadow-lg">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="rtl:rotate-180"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button @click="nextSlide()" class="absolute end-4 top-1/2 -translate-y-1/2 z-10 w-10 h-10 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center text-white hover:bg-black/80 hover:scale-105 transition-all border border-white/10 shadow-lg">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="rtl:rotate-180"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </div>

              <!-- Indicators -->
              <div class="absolute bottom-4 inset-x-0 flex justify-center gap-2 z-10" x-show="groupData.models.length > 1">
                <template x-for="(model, idx) in groupData.models" :key="model.id">
                  <button @click="activeIndex = idx" :class="activeIndex === idx ? 'bg-amber-500 w-8' : 'bg-white/40 w-2 hover:bg-white/70'" class="h-2 rounded-full transition-all duration-300"></button>
                </template>
              </div>
            </div>

            <!-- Description & Info Below Carousel -->
            <div class="mt-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 p-5 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition-colors">
              <div class="flex-1">
                <template x-for="(model, idx) in groupData.models" :key="model.id">
                  <div x-show="activeIndex === idx" x-transition.opacity.duration.300ms>
                    <p class="text-amber-500 text-[0.65rem] font-bold uppercase tracking-[0.2em] mb-1.5" x-text="model.name"></p>
                    <p class="text-slate-300 text-sm leading-relaxed" x-text="model.description"></p>
                  </div>
                </template>
              </div>
              <div class="shrink-0 flex items-center">
                <button @click="openModal(groupData.models[activeIndex])" class="group flex items-center gap-3 px-6 py-3 bg-amber-600 hover:bg-amber-500 rounded-xl text-slate-900 text-sm font-bold uppercase tracking-widest transition-all shadow-[0_4px_20px_rgba(201,169,110,0.2)] hover:shadow-[0_4px_25px_rgba(201,169,110,0.4)]">
                  <span x-text="lang==='ar' ? 'عرض التصميم' : 'View Design'"></span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="rtl:rotate-180 group-hover:translate-x-1 transition-transform"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- CTA strip -->
      <div class="mt-20 p-12 border border-amber-600/20 bg-amber-600/5 text-center">
        <p class="text-xs uppercase tracking-[0.4em] text-amber-600 mb-4"
           x-text="lang==='ar' ? 'ابدأ رحلتك' : 'Start Your Journey'"></p>
        <h2 class="text-3xl font-light text-slate-200 mb-6"
            x-text="lang==='ar' ? 'احجز استشارة مجانية' : 'Book a Free Majlis Consultation'"></h2>
        <button @click="openOrderForm()"
                class="px-10 py-4 bg-amber-600 text-slate-900 font-bold uppercase tracking-[0.25em] text-sm hover:bg-amber-500 transition-all duration-300">
          <span x-text="lang==='ar' ? 'تواصل معنا' : 'Get in Touch'"></span>
        </button>
      </div>
    </div>
  </section>


  <!-- ══════════════════════════════════════════════
       MODEL DETAIL MODAL
  ══════════════════════════════════════════════════ -->
  <div x-show="modalOpen" x-cloak
       x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100"
       x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 scale-100"
       x-transition:leave-end="opacity-0 scale-95"
       class="modal-backdrop" @click.self="closeModal()">

    <div class="modal-box" x-show="selectedModel">

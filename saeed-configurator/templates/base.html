<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}سعيد للمجالس الفاخرة{% endblock %}</title>

  <!-- Preconnect fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Global stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/configurator.css') }}">

  {% block head_extra %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  <!-- Main script (deferred for performance) -->
  <script src="{{ url_for('static', filename='js/configurator.js') }}" defer></script>
  {% block scripts_extra %}{% endblock %}
</body>
</html>

services:
  - type: web
    name: saeed-furniture
    env: node
    plan: free
    buildCommand: npm install && npx @tailwindcss/cli -i ./frontend/input.css -o ./frontend/dist/output.css --minify && npx esbuild frontend/src/react/index.jsx --bundle --outfile=frontend/dist/react-bundle.js --loader:.js=jsx --loader:.jsx=jsx --minify && cd saeed-backend && npm install
    startCommand: node ./saeed-backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: ALLOWED_ORIGINS
        value: "*"
      - fromGroup: saeed-furniture-secrets
    autoDeploy: true

envVarGroups:
  - name: saeed-furniture-secrets
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
